<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0B0F14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RitMeter">
<title>RitMeter — GPS snelheid &amp; trip</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F14;
    --panel:rgba(13,19,26,.82);
    --line:#22303E;
    --text:#E9EEF3;
    --muted:#7E8B98;
    --amber:#FFB300;
    --digit:#FFB300;       /* instelbare cijferkleur */
    --ok:#3AD673;
    --warn:#FFB300;
    --bad:#FF5252;
    --radius:18px;
    --sat:env(safe-area-inset-top,0px);
    --sab:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;touch-action:manipulation;
    user-select:none;-webkit-user-select:none}
  button{font:inherit;color:inherit;background:none;border:none;padding:0;cursor:pointer}

  #map{position:fixed;inset:0;background:#0B0F14}
  body.focusmode #map,body.hud #map{visibility:hidden}
  .maplibregl-ctrl-attrib{font-size:10px;background:rgba(11,15,20,.6)!important;color:#9aa7b4}
  .maplibregl-ctrl-attrib a{color:#9aa7b4!important}

  /* ── positiemarker ── */
  .me{width:46px;height:46px;position:relative}
  .me::before{content:"";position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(circle,rgba(255,179,0,.35),transparent 70%)}
  .me svg{position:absolute;inset:8px;filter:drop-shadow(0 1px 4px rgba(0,0,0,.6))}

  /* ── snelheidscluster ── */
  #speedCluster{position:fixed;top:calc(var(--sat) + 10px);left:50%;transform:translateX(-50%);
    z-index:10;background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--line);border-radius:var(--radius);
    padding:8px 26px 12px;text-align:center;min-width:196px;
    box-shadow:0 6px 24px rgba(0,0,0,.45)}
  #speedVal{font-family:"Chakra Petch",system-ui,sans-serif;font-weight:700;
    font-size:72px;line-height:1;letter-spacing:.5px;color:var(--text);
    font-variant-numeric:tabular-nums}
  #speedVal.moving{color:var(--digit)}
  #unitBtn{display:block;margin:2px auto 0;font-size:14px;font-weight:600;letter-spacing:.22em;
    color:var(--muted);text-transform:uppercase;padding:4px 14px;border-radius:99px}
  #unitBtn:active{color:var(--amber)}

  body.focusmode #speedCluster{top:46%;transform:translate(-50%,-90%);
    background:transparent;border:none;box-shadow:none;backdrop-filter:none;-webkit-backdrop-filter:none}
  body.focusmode #speedVal{font-size:min(44vw,200px)}
  body.focusmode #unitBtn{font-size:20px}

  /* ── hoogte & kompas ── */
  #extra{position:fixed;left:50%;transform:translateX(-50%);z-index:9;
    top:calc(var(--sat) + 156px);display:none;gap:18px;
    background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--line);border-radius:99px;padding:8px 18px;
    font-family:"Chakra Petch",sans-serif;font-size:16px;font-variant-numeric:tabular-nums;
    color:var(--text);white-space:nowrap}
  #extra.show{display:flex}
  #extra .lbl{color:var(--muted);font-family:system-ui,sans-serif;font-size:11px;
    letter-spacing:.12em;text-transform:uppercase;margin-right:6px;vertical-align:1px}
  body.focusmode #extra{top:64%}

  /* ── gps-status ── */
  #gps{position:fixed;top:calc(var(--sat) + 14px);right:14px;z-index:10;
    display:flex;align-items:center;gap:7px;background:var(--panel);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--line);border-radius:99px;padding:7px 13px;
    font-size:12px;color:var(--muted)}
  #gpsDot{width:9px;height:9px;border-radius:50%;background:var(--bad);transition:background .3s}
  #gpsDot.ok{background:var(--ok)}#gpsDot.mid{background:var(--warn)}

  /* ── kompasroos ── */
  #rose{position:fixed;top:calc(var(--sat) + 60px);right:14px;z-index:9;
    width:60px;height:60px;border-radius:50%;background:var(--panel);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--line);display:none}
  #rose.show{display:block}
  body.hud #rose{display:none!important}
  #rose text{font:700 11px system-ui;fill:var(--muted)}
  #rose .n{fill:var(--amber)}
  #roseG{transform-origin:30px 30px;transition:transform .6s linear}

  /* ── knoppen links ── */
  .fab{width:42px;height:42px;border-radius:50%;background:var(--panel);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--line);display:grid;place-items:center;color:var(--muted)}
  .fab:active{color:var(--amber)}
  #modeBtn{position:fixed;top:calc(var(--sat) + 14px);left:14px;z-index:10}
  #setBtn{position:fixed;top:calc(var(--sat) + 66px);left:14px;z-index:10}
  #histBtn{position:fixed;top:calc(var(--sat) + 118px);left:14px;z-index:10}

  /* ── tripbalk ── */
  #trip{position:fixed;left:10px;right:10px;bottom:calc(var(--sab) + 10px);z-index:10;
    background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;box-shadow:0 6px 24px rgba(0,0,0,.45)}
  #stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;text-align:center}
  .stat b{display:block;font-family:"Chakra Petch",sans-serif;font-weight:600;font-size:21px;
    font-variant-numeric:tabular-nums;color:var(--text)}
  .stat span{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  #btnRow{display:flex;gap:10px}
  .btn{flex:1;padding:13px 0;border-radius:13px;font-weight:700;font-size:16px;letter-spacing:.04em;
    border:1px solid var(--line);background:#141C25;transition:transform .06s}
  .btn:active{transform:scale(.97)}
  #startBtn.go{background:var(--amber);border-color:var(--amber);color:#1A1200}
  #startBtn.halt{background:#2A1313;border-color:#5c2727;color:#FF8A8A}
  #resetBtn{flex:0 0 auto;padding-left:16px;padding-right:16px;color:var(--muted)}
  #resetBtn:disabled{opacity:.35}

  /* ── HUD ── */
  body.hud #speedCluster{top:46%;transform:translate(-50%,-55%) scaleX(-1);
    background:transparent;border:none;box-shadow:none;backdrop-filter:none;-webkit-backdrop-filter:none}
  body.hud #speedVal{font-size:min(52vw,240px);color:var(--digit)}
  body.hud #unitBtn{font-size:22px;pointer-events:none}
  body.hud #trip,body.hud #gps,body.hud #modeBtn,body.hud #setBtn,body.hud #histBtn,
  body.hud #extra{display:none!important}
  #hudData{position:fixed;top:66%;left:50%;transform:translateX(-50%) scaleX(-1);z-index:11;
    display:none;font-family:"Chakra Petch",sans-serif;font-size:26px;
    font-variant-numeric:tabular-nums;color:var(--muted);white-space:nowrap}
  body.hud.hudinfo #hudData{display:block}
  #hudExit{position:fixed;inset:0;z-index:40;display:none}
  body.hud #hudExit{display:block}
  #hudHint{position:absolute;bottom:calc(var(--sab) + 18px);left:0;right:0;text-align:center;
    color:var(--muted);font-size:13px;letter-spacing:.08em}

  /* ── nachtdimmer ── */
  #dim{position:fixed;inset:0;z-index:65;background:#000;opacity:0;pointer-events:none}

  /* ── instellingen ── */
  #settings{position:fixed;inset:0;z-index:60;display:none;place-items:end center;
    background:rgba(5,8,11,.6)}
  #settings.show{display:grid}
  #setCard{width:100%;max-width:430px;background:#10161E;border:1px solid var(--line);
    border-radius:var(--radius) var(--radius) 0 0;max-height:82vh;overflow-y:auto;
    padding:20px 20px calc(var(--sab) + 20px)}
  #setCard h2{margin:0 0 14px;font-family:"Chakra Petch",sans-serif;font-size:19px;
    letter-spacing:.04em;color:var(--text)}
  .row{display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:13px 0;border-top:1px solid var(--line)}
  .row .info b{display:block;font-size:15px;font-weight:600}
  .row .info span{font-size:12.5px;color:var(--muted);line-height:1.35;display:block;margin-top:2px}
  .seg{display:flex;background:#0B0F14;border:1px solid var(--line);border-radius:11px;padding:3px;flex:none}
  .seg button{padding:7px 16px;border-radius:8px;font-size:13.5px;font-weight:700;color:var(--muted)}
  .seg button.on{background:var(--amber);color:#1A1200}
  .switch{flex:none;width:50px;height:29px;border-radius:99px;background:#1A232E;
    border:1px solid var(--line);position:relative;transition:background .2s}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:23px;height:23px;
    border-radius:50%;background:var(--muted);transition:transform .2s,background .2s}
  .switch.on{background:var(--amber)}
  .switch.on::after{transform:translateX(21px);background:#1A1200}
  .swatches{display:flex;gap:10px;flex:none}
  .sw{width:30px;height:30px;border-radius:50%;border:2px solid transparent}
  .sw.on{border-color:#fff}
  input[type=range]{accent-color:var(--amber);width:130px;flex:none}
  #hudGo{flex:none;padding:9px 18px;border-radius:11px;background:#141C25;
    border:1px solid var(--line);font-weight:700;font-size:13.5px;color:var(--amber)}
  #setClose{display:block;width:100%;margin-top:18px;padding:13px 0;border-radius:13px;
    background:var(--amber);color:#1A1200;font-weight:700;font-size:16px}

  /* ── geschiedenis & ritdetail ── */
  .page{position:fixed;inset:0;z-index:58;display:none;flex-direction:column;background:var(--bg)}
  .page.show{display:flex}
  .pageHead{display:flex;align-items:center;gap:12px;
    padding:calc(var(--sat) + 14px) 16px 12px;border-bottom:1px solid var(--line)}
  .pageHead h2{margin:0;font-family:"Chakra Petch",sans-serif;font-size:18px;flex:1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pageHead .fab{width:38px;height:38px}
  .pageBody{flex:1;overflow-y:auto;padding:14px 16px calc(var(--sab) + 16px)}
  #histActs{display:flex;gap:8px;margin-bottom:14px}
  .hbtn{flex:1;padding:10px 6px;border-radius:11px;background:#141C25;
    border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--text)}
  .hbtn:active{color:var(--amber)}
  #histTotals{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
  .tot{background:#10161E;border:1px solid var(--line);border-radius:13px;
    padding:10px 6px;text-align:center}
  .tot span{display:block;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .tot b{display:block;font-family:"Chakra Petch",sans-serif;font-size:15px;
    font-variant-numeric:tabular-nums;margin-top:3px}
  .tot i{font-style:normal;font-size:10.5px;color:var(--muted)}
  .hrow{width:100%;display:flex;justify-content:space-between;align-items:center;gap:12px;
    text-align:left;padding:14px 2px;border-bottom:1px solid var(--line)}
  .hrow .l b{display:block;font-size:15px;font-weight:600}
  .hrow .l span,.hrow .r span{font-size:12px;color:var(--muted)}
  .hrow .r{text-align:right}
  .hrow .r b{display:block;font-family:"Chakra Petch",sans-serif;font-size:18px;
    font-variant-numeric:tabular-nums;color:var(--amber)}
  #histEmpty{color:var(--muted);font-size:14px;line-height:1.5;padding:24px 6px;text-align:center}

  #detStats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
  #detStats .stat{background:#10161E;border:1px solid var(--line);border-radius:13px;
    padding:12px 10px;text-align:center}
  #dmap{height:240px;border-radius:13px;overflow:hidden;border:1px solid var(--line);
    background:#10161E;margin-bottom:14px}
  #profWrap{background:#10161E;border:1px solid var(--line);border-radius:13px;
    padding:12px;margin-bottom:14px}
  #profWrap h3{margin:0 0 8px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);font-weight:600}
  #profile{width:100%;height:140px;display:block}
  #profNote{color:var(--muted);font-size:13px;margin:6px 0 0;display:none}
  .actRow{display:flex;gap:10px}
  #shareBtn{flex:1;padding:13px 0;border-radius:13px;background:var(--amber);
    color:#1A1200;font-weight:700;font-size:15px}
  #delBtn{flex:0 0 auto;padding:13px 18px;border-radius:13px;background:#2A1313;
    border:1px solid #5c2727;color:#FF8A8A;font-weight:700;font-size:15px}

  /* ── toast & meldingen ── */
  #toast{position:fixed;left:50%;bottom:calc(var(--sab) + 110px);transform:translateX(-50%) translateY(10px);
    z-index:80;background:#1A232E;border:1px solid var(--line);border-radius:99px;
    padding:10px 20px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;
    transition:opacity .25s,transform .25s;white-space:nowrap}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  #notice{position:fixed;inset:0;z-index:70;display:none;place-items:center;
    background:rgba(11,15,20,.92);padding:30px;text-align:center}
  #notice.show{display:grid}
  #notice .card{max-width:340px}
  #notice h2{font-family:"Chakra Petch",sans-serif;color:var(--amber);margin:0 0 10px}
  #notice p{color:var(--muted);line-height:1.5;font-size:15px}
  #notice button{margin-top:16px;padding:12px 28px;border-radius:13px;background:var(--amber);
    color:#1A1200;font-weight:700}
/* ═══ navigatie-overlay ═══════════════════════════════════ */
:root{ --nav:#E000FF; --nav-dark:#3A0A33; }

/* kompas-FAB (vierde knop in de linker rail) */
#navBtn{position:fixed;top:calc(var(--sat) + 170px);left:14px;z-index:10}
#navBtn:active{color:var(--nav)}

/* ── zoek-/instelpaneel (bottom sheet) ── */
#navPanel{position:fixed;left:0;right:0;bottom:0;z-index:55;
  background:#10161E;border-top:1px solid var(--line);
  border-radius:var(--radius) var(--radius) 0 0;
  padding:10px 16px calc(var(--sab) + 16px);
  max-height:76vh;overflow-y:auto;
  transform:translateY(110%);transition:transform .28s ease;
  box-shadow:0 -8px 30px rgba(0,0,0,.5)}
#navPanel.show{transform:none}
.navGrip{width:42px;height:5px;border-radius:99px;background:var(--line);
  margin:2px auto 12px}
.navTop{display:flex;gap:10px;align-items:center;margin-bottom:10px}
#navSearch{flex:1;min-width:0;background:#0B0F14;border:1px solid var(--line);
  border-radius:12px;padding:12px 14px;color:var(--text);font-size:16px;outline:none}
#navSearch:focus{border-color:var(--nav)}
.navX{width:40px;height:40px;flex:none;border-radius:12px;background:#141C25;
  border:1px solid var(--line);font-size:22px;line-height:1;color:var(--muted);
  display:grid;place-items:center}
.navX:active{color:var(--nav)}

#navResults:empty,#navFavs:empty{display:none}
.navRes{width:100%;display:block;text-align:left;padding:11px 12px;
  border-bottom:1px solid var(--line)}
.navRes b{display:block;font-size:15px;font-weight:600;color:var(--text)}
.navRes span{display:block;font-size:12.5px;color:var(--muted);margin-top:2px}
.navRes:active{background:#141C25}
.navMsg{color:var(--muted);font-size:13px;padding:10px 2px}

#navFavs{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 4px}
.navChip{display:flex;align-items:center;background:#141C25;border:1px solid var(--line);
  border-radius:99px;overflow:hidden}
.navChipGo{padding:9px 6px 9px 14px;font-size:13.5px;font-weight:600;color:var(--text);
  max-width:46vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.navChipX{padding:9px 12px 9px 6px;font-size:15px;color:var(--muted)}
.navChipX:active{color:var(--bad)}

.navSeg{display:flex;background:#0B0F14;border:1px solid var(--line);
  border-radius:12px;padding:3px;margin:12px 0 0;gap:3px}
.navSeg button{flex:1;padding:9px 4px;border-radius:9px;font-size:13px;font-weight:700;
  color:var(--muted);white-space:nowrap}
.navSeg button.on{background:var(--nav);color:#fff}

.navInfo{margin:12px 0;min-height:20px;font-size:14px;color:var(--muted);
  font-variant-numeric:tabular-nums}
.navInfo b{font-family:"Chakra Petch",sans-serif;font-size:18px;color:var(--text)}

.navBtns{display:flex;gap:10px}
#navStart{flex:1;padding:14px 0;border-radius:13px;background:var(--nav);
  color:#fff;font-weight:700;font-size:16px;border:1px solid var(--nav)}
#navStart:disabled{opacity:.4;background:#141C25;border-color:var(--line);color:var(--muted)}
#navSaveFav{flex:0 0 auto;width:52px;border-radius:13px;background:#141C25;
  border:1px solid var(--line);font-size:20px;color:var(--amber);display:none;
  place-items:center}

/* ── turn-by-turn HUD-balk (bovenin) ── */
#navHud{position:fixed;top:calc(var(--sat) + 10px);left:10px;right:10px;z-index:30;
  display:none;align-items:center;gap:14px;
  background:rgba(13,19,26,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--nav);border-radius:16px;padding:10px 12px;
  box-shadow:0 6px 24px rgba(0,0,0,.5)}
#navHud.show{display:flex}
#navArrow{flex:none;width:42px;height:42px;display:grid;place-items:center;color:var(--nav)}
.navHudText{flex:1;min-width:0}
.navHudText b{display:block;font-family:"Chakra Petch",sans-serif;font-size:26px;
  line-height:1.05;color:var(--text);font-variant-numeric:tabular-nums}
.navHudText span{display:block;font-size:12px;color:var(--muted);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.navStop{flex:none;width:38px;height:38px;border-radius:50%;background:#2A1313;
  border:1px solid #5c2727;color:#FF8A8A;font-size:20px;display:grid;place-items:center}

/* bestemmingspin op de kaart */
.navDest svg{filter:drop-shadow(0 2px 4px rgba(0,0,0,.6))}

/* zodra er genavigeerd wordt: bestaande UI naar onder, HUD krijgt ruimte bovenin */
body.navigating #speedCluster{top:calc(var(--sat) + 92px)}
body.navigating #gps{top:calc(var(--sat) + 92px)}
body.navigating #modeBtn{top:calc(var(--sat) + 92px)}
body.navigating #setBtn{top:calc(var(--sat) + 144px)}
body.navigating #histBtn{top:calc(var(--sat) + 196px)}
body.navigating #navBtn{top:calc(var(--sat) + 248px)}
body.navigating #extra,body.navigating #rose{display:none!important}

/* HUD-/focus-modus en navigatie sluiten elkaar uit */
body.hud #navHud,body.focusmode #navHud{display:none!important}
body.hud #navBtn,body.focusmode #navBtn,body.hud #navPanel,body.focusmode #navPanel{
  display:none!important}

/* ═══ LANDSCAPE: brede panelen naar de zijkanten, kaart vrij ═══ */
@media (orientation: landscape){
  /* snelheidscluster compact naar links-boven i.p.v. centraal */
  #speedCluster{left:14px;transform:none;top:calc(var(--sat) + 10px);
    min-width:0;padding:6px 18px 8px}
  #speedVal{font-size:46px}
  body.navigating #speedCluster{top:calc(var(--sat) + 64px)}

  /* zoekpaneel als linker kolom i.p.v. bottom sheet */
  #navPanel{left:10px;right:auto;top:calc(var(--sat) + 10px);
    bottom:calc(var(--sab) + 10px);width:min(380px,44vw);
    border-radius:var(--radius);border:1px solid var(--line);
    transform:translateX(-115%)}
  #navPanel.show{transform:none}
  .navChipGo{max-width:200px}

  /* HUD-balk rechts-boven, smal — kaart in het midden blijft vrij */
  #navHud{left:auto;right:14px;top:calc(var(--sat) + 10px);width:min(340px,42vw)}
  body.navigating #speedCluster{top:calc(var(--sat) + 10px)} /* HUD staat rechts, geen overlap */
  body.navigating #gps,body.navigating #modeBtn{top:calc(var(--sat) + 10px)}
  body.navigating #setBtn{top:calc(var(--sat) + 62px)}

const $ = id => document.getElementById(id);
const LS = localStorage;

/* ── vertalingen ─────────────────────────────────────────── */
const I18N = {

    eta_hr:"u", eta_min:"min"
  },
  en: {

    start:"Start trip", stop:"Stop", resume:"Resume", reset:"Reset",
    save_reset:"Save & reset", saved:"Trip saved", cleared:"Counter reset",
    alt:"altitude", hdg:"heading", nofix:"no fix", paused:"paused",
    set_title:"Settings", lang:"Language", lang_d:"App language",
    unit:"Units", unit_d:"Speed and distance",
    extra:"Altitude & compass", extra_d:"Show altitude and travel direction",
    color:"Digit colour", color_d:"For the speedometer and HUD",
    apause:"Auto-pause", apause_d:"Time pauses after 5 s standstill",
    hudinfo:"Trip info in HUD", hudinfo_d:"Show distance and time in the HUD",
    dim:"Night dimmer", dim_d:"Dim the display in the dark",
    hud:"HUD mode", hud_d:"Mirrored display for windshield reflection. Tap the screen to return.",
    hud_go:"Start HUD", hud_hint:"tap to exit HUD", close:"Close",
    hist:"History",
    hist_empty:"No saved trips yet. A trip is stored when you tap \u201CSave & reset\u201D after stopping.",
    trips:"trips", total:"total", week:"this week", month:"this month",
    backup:"Backup", restore:"Restore", gpx_all:"All as GPX",
    restored:"trips restored", bad_file:"Invalid backup file",
    started:"started", accuracy:"gps accuracy",
    profile:"Elevation profile", no_alt:"No usable elevation data in this trip.",
    share_gpx:"Share as GPX", del:"Delete",
    confirm_del:"Permanently delete this trip?",
    ntc_need:"Location needed",
    ntc_need_t:"RitMeter needs access to your GPS to measure speed and distance. Allow access when your phone asks.",
    ntc_deny:"Location denied",
    ntc_deny_t:"Enable location access for this app in your browser or phone settings and try again.",
    ntc_nogps:"No GPS", ntc_nogps_t:"This browser does not support geolocation.",
    retry:"Try again",
    cards:["N","NE","E","SE","S","SW","W","NW"],
    nav_search:"Search destination", p_car:"Car", p_bike:"Bike", p_moped:"Moped",
    p_snor:"Light moped", eta:"ETA", del:"Delete",
    nav_start:"Start navigation", nav_calc:"Calculating route\u2026",
    nav_err:"Could not find a route", nav_none:"No results",
    nav_no_favs:"No saved places yet", nav_wait_gps:"Waiting for GPS\u2026",
    nav_rerouted:"Route recalculated", nav_arrived:"Arrived",
    nav_fav_saved:"Place saved", nav_fav_full:"Maximum of 5 places",
    eta_hr:"hr", eta_min:"min"
  }
};
let lang = LS.getItem("rm_lang") || "nl";
const t = k => I18N[lang][k];
const loc = () => lang === "nl" ? "nl-NL" : "en-GB";

/* ── instellingen & status ───────────────────────────────── */
const COLORS = { amber:"#FFB300", white:"#E9EEF3", green:"#34E07A" };
let useMph    = LS.getItem("rm_unit")  === "mph";
let focus     = LS.getItem("rm_focus") === "1";
let showExtra = LS.getItem("rm_extra") === "1";
let autoPause = LS.getItem("rm_apause")=== "1";
let hudInfoOn = LS.getItem("rm_hudinfo")==="1";
let digitColor= LS.getItem("rm_color") || "amber";
let dimVal    = Math.min(.6, Math.max(0, parseFloat(LS.getItem("rm_dim") || "0")));
let hud = false, mapReady = false, firstFix = false;

const trip = Object.assign(
  { running:false, dist:0, ms:0, max:0, start:0, accSum:0, accN:0 },
  JSON.parse(LS.getItem("rm_trip") || "{}"),
  { running:false }
);
let route = trip.ms > 0 ? JSON.parse(LS.getItem("rm_route") || "[]") : [];

let lastPos = null;        // anker voor afstandsmeting
let lastSample = null;     // laatste routepunt-sample
let fixBuf = [];           // recente fixes voor venster-snelheid & stilstand
let dispSpeed = 0;         // gefilterde snelheid (m/s)
let lastBearing = null, lastAlt = null, lastFixTime = 0;
let isPaused = false, zeroSince = null;

/* ── helpers ─────────────────────────────────────────────── */
const R = 6371000;
function haversine(a, b){
  const toR = x => x * Math.PI / 180;
  const dLat = toR(b.latitude - a.latitude), dLon = toR(b.longitude - a.longitude);
  const s = Math.sin(dLat/2)**2 +
            Math.cos(toR(a.latitude)) * Math.cos(toR(b.latitude)) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(s));
}
const hv = (p, q) => haversine({latitude:p.lat, longitude:p.lon}, {latitude:q.lat, longitude:q.lon});
const unitLbl  = () => useMph ? t("unit_mph") : t("unit_kmh");
const fmtSpeed = ms => Math.round(ms * (useMph ? 2.23694 : 3.6));
const fmtDist  = m  => {
  const v = useMph ? (m/1609.344).toFixed(2) : (m/1000).toFixed(2);
  return lang === "nl" ? v.replace(".", ",") : v;
};
function fmtTime(ms){
  const s = Math.floor(ms/1000), h = Math.floor(s/3600), m = Math.floor(s%3600/60);
  return h ? `${h}:${String(m).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`
           : `${m}:${String(s%60).padStart(2,"0")}`;
}
const cardinal = deg => t("cards")[Math.round(((deg % 360) + 360) % 360 / 45) % 8];
function toast(msg){
  $("toast").textContent = msg;
  $("toast").classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => $("toast").classList.remove("show"), 2000);
}

/* ── IndexedDB (puur, zonder library) ────────────────────── */
let dbP = null;
function db(){
  if (!dbP) dbP = new Promise((res, rej) => {
    const rq = indexedDB.open("ritmeter", 1);
    rq.onupgradeneeded = () => rq.result.createObjectStore("trips", { keyPath:"id" });
    rq.onsuccess = () => res(rq.result);
    rq.onerror   = () => rej(rq.error);
  });
  return dbP;
}
const tx = (d, mode) => d.transaction("trips", mode).objectStore("trips");
const idbPut = trip => db().then(d => new Promise((res, rej) => {
  const r = tx(d, "readwrite").put(trip); r.onsuccess = res; r.onerror = () => rej(r.error);
}));
const idbAll = () => db().then(d => new Promise((res, rej) => {
  const r = tx(d, "readonly").getAll(); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
}));
const idbGet = id => db().then(d => new Promise((res, rej) => {
  const r = tx(d, "readonly").get(id); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
}));
const idbDel = id => db().then(d => new Promise((res, rej) => {
  const r = tx(d, "readwrite").delete(id); r.onsuccess = res; r.onerror = () => rej(r.error);
}));

/* ── kaart (hoofdscherm) ─────────────────────────────────── */
const STYLE = "https://tiles.openfreemap.org/styles/liberty";
let map, marker;
function initMap(lon, lat){
  map = new maplibregl.Map({
    container:"map", style:STYLE,
    center:[lon,lat], zoom:17, pitch:60, bearing:0,
    attributionControl:{compact:true}, fadeDuration:0
  });
  map.touchZoomRotate.disableRotation();
  map.setPadding({ top: Math.round(window.innerHeight * .45) });
  const el = document.createElement("div");
  el.className = "me";
  el.innerHTML = `<svg viewBox="0 0 30 30"><path d="M15 3 L25 27 L15 21 L5 27 Z" fill="#FFB300" stroke="#0B0F14" stroke-width="1.5"/></svg>`;
  marker = new maplibregl.Marker({element:el, rotationAlignment:"map"})
            .setLngLat([lon,lat]).addTo(map);
  map.on("load", () => { mapReady = true; });
}
function updateCamera(lon, lat, bearing){
  if (!marker) return;
  marker.setLngLat([lon,lat]);
  marker.setRotation(bearing ?? 0);
  if (!focus && !hud && mapReady)
    map.easeTo({ center:[lon,lat], bearing:bearing ?? map.getBearing(), duration:600, easing:x=>x });
}

/* ── GPS & snelheidsfilter ───────────────────────────────── */
function startGPS(){
  if (!("geolocation" in navigator)){ showNotice(t("ntc_nogps"), t("ntc_nogps_t")); return; }
  navigator.geolocation.watchPosition(onFix, onErr,
    { enableHighAccuracy:true, maximumAge:1000, timeout:15000 });
}

/* Adaptieve smoothing: hoe slechter de fix en hoe lager de snelheid,
   hoe zwaarder we dempen. */
function alphaFor(acc, v){
  let a = acc <= 5 ? .60 : acc <= 10 ? .45 : acc <= 20 ? .30 : .20;
  if (v < 3) a *= .8;           // extra demping bij fietssnelheden
  return a;
}

function onFix(pos){
  hideNotice();
  const c = pos.coords, ts = pos.timestamp;
  lastFixTime = Date.now();
  if (!firstFix){ firstFix = true; initMap(c.longitude, c.latitude); }

  const acc = c.accuracy ?? 999;
  $("gpsDot").className = acc <= 8 ? "ok" : acc <= 25 ? "mid" : "";
  $("gpsTxt").textContent = `±${Math.round(acc)} m`;

  /* hoogte (gesmoothed) */
  if (c.altitude != null && !isNaN(c.altitude))
    lastAlt = lastAlt == null ? c.altitude : lastAlt * .7 + c.altitude * .3;

  /* fix-buffer (±12 s) voor venster-snelheid en stilstanddetectie */
  fixBuf.push({ t:ts, lat:c.latitude, lon:c.longitude, acc });
  while (fixBuf.length && ts - fixBuf[0].t > 12000) fixBuf.shift();

  /* meting: chip-snelheid primair, anders verplaatsing over ~3 s venster */
  let m = (c.speed != null && !isNaN(c.speed) && c.speed >= 0) ? c.speed : null;
  if (m === null && fixBuf.length > 1){
    let ref = fixBuf[0];
    for (const f of fixBuf) if (ts - f.t >= 3000) ref = f;
    const dt = (ts - ref.t) / 1000;
    if (dt > 0.8) m = hv(ref, {lat:c.latitude, lon:c.longitude}) / dt;
  }

  /* stilstand: nauwelijks verplaatsing over de laatste ~5 s */
  let still = false;
  const old5 = fixBuf.find(f => ts - f.t >= 4500);
  if (old5){
    const moved = hv(old5, {lat:c.latitude, lon:c.longitude});
    if (moved < Math.max(4, Math.min(acc, 25) * .8)) still = true;
  }

  if (still){
    dispSpeed *= .3;
    if (dispSpeed < .45) dispSpeed = 0;
  } else if (m !== null){
    if (m < .6) m = 0;
    dispSpeed += alphaFor(acc, m) * (m - dispSpeed);
    if (dispSpeed < .45 && m < .7) dispSpeed = 0;
  }

  /* koers: alleen bij echte beweging */
  if (c.heading != null && !isNaN(c.heading) && dispSpeed > 1.1) lastBearing = c.heading;

  /* tripafstand + routepunten */
  if (trip.running && acc <= 35){
    trip.accSum += acc; trip.accN++;
    const here = { lat:c.latitude, lon:c.longitude };
    if (lastPos){
      const d  = hv(lastPos, here);
      const dt = (ts - lastPos.t) / 1000;
      if (d > Math.min(acc, 12) * .6 && (dt <= 0 || d/dt < 70)){
        trip.dist += d;
        if (dispSpeed > trip.max) trip.max = dispSpeed;
        lastPos = { ...here, t:ts };
      } else if (d > 200){
        lastPos = { ...here, t:ts };          // grote sprong: opnieuw verankeren
      }
    } else lastPos = { ...here, t:ts };

    /* sample elke 3 s of elke 25 m */
    if (!lastSample || ts - lastSample.t >= 3000 || hv(lastSample, here) >= 25){
      route.push({ t:ts, lat:+c.latitude.toFixed(6), lon:+c.longitude.toFixed(6),
                   v:+dispSpeed.toFixed(2),
                   alt: lastAlt == null ? null : +lastAlt.toFixed(1),
                   acc: Math.round(acc) });
      lastSample = { ...here, t:ts };
    }
  } else {
    lastPos = { lat:c.latitude, lon:c.longitude, t:ts };
  }

  updateCamera(c.longitude, c.latitude, lastBearing);
  render();
  navOnFix(c);   // navigatie-overlay (gebruikt c = pos.coords)
}

function onErr(e){
  if (e.code === 1) showNotice(t("ntc_deny"), t("ntc_deny_t"));
  else $("gpsTxt").textContent = t("nofix");
}

/* ── klok, auto-pauze & persistentie ─────────────────────── */
setInterval(() => {
  /* GPS al >4 s stil? Snelheid gecontroleerd laten zakken. */
  if (firstFix && Date.now() - lastFixTime > 4000){
    dispSpeed *= .5; if (dispSpeed < .4) dispSpeed = 0;
  }
  /* auto-pauze: >5 s vrijwel stilstand */
  if (dispSpeed < .55){
    if (zeroSince === null) zeroSince = Date.now();
    isPaused = autoPause && (Date.now() - zeroSince > 5000);
  } else { zeroSince = null; isPaused = false; }

  if (trip.running && !(autoPause && isPaused)){ trip.ms += 1000; }
  if (trip.running || dispSpeed > 0) render();
}, 1000);

setInterval(() => {
  LS.setItem("rm_trip", JSON.stringify(trip));
  if (trip.running) LS.setItem("rm_route", JSON.stringify(route));
}, 15000);

  const avg = trip.ms > 3000 ? trip.dist / (trip.ms/1000) : 0;

  $("stMax").textContent = fmtSpeed(trip.max);

  $("unitBtn").textContent = unitLbl();
  $("stDistU").textContent = useMph ? "mi" : "km";
  $("stTimeU").textContent = t("time") + (trip.running && isPaused && autoPause ? " ⏸" : "");
  $("stAvgU").textContent  = t("avg") + " " + unitLbl();
  $("stMaxU").textContent  = t("max") + " " + unitLbl();

  $("startBtn").textContent = trip.running ? t("stop") : (trip.ms ? t("resume") : t("start"));
  $("startBtn").className   = "btn " + (trip.running ? "halt" : "go");
  $("resetBtn").textContent = trip.dist >= 100 ? t("save_reset") : t("reset");
  $("resetBtn").disabled    = trip.running || !trip.ms;

  if (showExtra){
    $("altVal").textContent = lastAlt == null ? "—"
      : useMph ? Math.round(lastAlt * 3.28084) + " ft" : Math.round(lastAlt) + " m";
    $("hdgVal").textContent = lastBearing == null ? "—"
      : Math.round(lastBearing) + "° " + cardinal(lastBearing);
  }
  if (showExtra && lastBearing != null)
    $("roseG").style.transform = `rotate(${-lastBearing}deg)`;

  if (hud && hudInfoOn)
    $("hudData").textContent =
      `${fmtDist(trip.dist)} ${useMph ? "mi" : "km"} · ${fmtTime(trip.ms)}`;
}

function tripName(start){
  const d = new Date(start || Date.now());
  return d.toLocaleDateString(loc(), { day:"numeric", month:"short" }) + " " +
         d.toLocaleTimeString(loc(), { hour:"2-digit", minute:"2-digit" });
}
async function saveAndReset(){
  if (trip.dist >= 100){
    const rec = {
      id: trip.start || Date.now(),
      name: tripName(trip.start),
      start: trip.start || Date.now(), end: Date.now(),
      ms: trip.ms, dist: trip.dist, max: trip.max,
      accAvg: trip.accN ? trip.accSum / trip.accN : null,
      points: route
    };
    try { await idbPut(rec); toast(t("saved")); }
    catch(e){ console.error(e); }
  } else toast(t("cleared"));
  Object.assign(trip, { running:false, dist:0, ms:0, max:0, start:0, accSum:0, accN:0 });
  route = []; lastSample = null;
  LS.setItem("rm_trip", JSON.stringify(trip));
  LS.removeItem("rm_route");
  render();
}

let dmapInst = null, detId = null;
async function openDetail(id){
  const r = await idbGet(id); if (!r) return;

  $("detTitle").textContent = r.name;

  const avg = r.ms > 0 ? r.dist / (r.ms/1000) : 0;

  $("detStats").innerHTML =

    stat(fmtSpeed(r.max) + " " + unitLbl(), t("max")) +
    stat(new Date(r.start).toLocaleString(loc(), {dateStyle:"short", timeStyle:"short"}), t("started")) +
    stat(r.accAvg ? "±" + Math.round(r.accAvg) + " m" : "—", t("accuracy"));

  /* kaart met route-polyline */
  if (dmapInst){ dmapInst.remove(); dmapInst = null; }
  const pts = (r.points || []).filter(p => p.lat && p.lon);
  if (pts.length >= 2){
    setTimeout(() => {
      const coords = pts.map(p => [p.lon, p.lat]);
      const bounds = coords.reduce((b,c) => b.extend(c),
        new maplibregl.LngLatBounds(coords[0], coords[0]));
      dmapInst = new maplibregl.Map({
        container:"dmap", style:STYLE, bounds, fitBoundsOptions:{ padding:34 },
        attributionControl:{compact:true}, fadeDuration:0
      });
      dmapInst.on("load", () => {
        dmapInst.addSource("route", { type:"geojson",
          data:{ type:"Feature", geometry:{ type:"LineString", coordinates:coords } } });
        dmapInst.addLayer({ id:"route", type:"line", source:"route",
          paint:{ "line-color":"#2D8CFF", "line-width":4, "line-opacity":.9 } });
      });
    }, 60);
    $("dmap").style.display = "block";
  } else $("dmap").style.display = "none";

  drawProfile(pts);
}

  $("detail").classList.remove("show");

}

/* ── hoogteprofiel (Canvas) ──────────────────────────────── */
function drawProfile(pts){
  const cv = $("profile"), note = $("profNote");
  const data = [];
  let cum = 0;
  for (let i = 0; i < pts.length; i++){
    if (i) cum += hv(pts[i-1], pts[i]);
    if (pts[i].alt != null) data.push({ x:cum, y:pts[i].alt });
  }
  if (data.length < 2){
    cv.style.display = "none"; note.style.display = "block"; note.textContent = t("no_alt");
    return;
  }
  cv.style.display = "block"; note.style.display = "none";

  const dpr = window.devicePixelRatio || 1;
  const W = cv.clientWidth || 300, H = 140;
  cv.width = W * dpr; cv.height = H * dpr;
  const g = cv.getContext("2d"); g.scale(dpr, dpr);

  const padL = 34, padR = 8, padT = 10, padB = 20;
  const minY0 = Math.min(...data.map(p => p.y)), maxY0 = Math.max(...data.map(p => p.y));
  const span = Math.max(10, maxY0 - minY0);
  const minY = minY0 - (span - (maxY0 - minY0)) / 2, maxY = minY + span;
  const maxX = data[data.length - 1].x || 1;
  const X = x => padL + (x / maxX) * (W - padL - padR);
  const Y = y => padT + (1 - (y - minY) / span) * (H - padT - padB);

  g.clearRect(0, 0, W, H);
  /* vlakvulling + lijn */
  g.beginPath(); g.moveTo(X(data[0].x), Y(data[0].y));
  for (const p of data) g.lineTo(X(p.x), Y(p.y));
  g.lineTo(X(maxX), H - padB); g.lineTo(X(0), H - padB); g.closePath();
  g.fillStyle = "rgba(255,179,0,.12)"; g.fill();
  g.beginPath(); g.moveTo(X(data[0].x), Y(data[0].y));
  for (const p of data) g.lineTo(X(p.x), Y(p.y));
  g.strokeStyle = "#FFB300"; g.lineWidth = 2; g.lineJoin = "round"; g.stroke();

  /* as-labels */
  g.fillStyle = "#7E8B98"; g.font = "10px system-ui";
  const aF = m => useMph ? Math.round(m * 3.28084) + " ft" : Math.round(m) + " m";
  g.fillText(aF(maxY0), 2, Y(maxY0) + 3);
  g.fillText(aF(minY0), 2, Y(minY0) + 3);
  g.fillText("0", padL, H - 6);
  const dTxt = fmtDist(maxX) + " " + (useMph ? "mi" : "km");
  g.fillText(dTxt, W - padR - g.measureText(dTxt).width, H - 6);
}

/* ── GPX-export & delen ──────────────────────────────────── */
const gpxDoc = inner => `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="RitMeter" xmlns="http://www.topografix.com/GPX/1/1">
${inner}
</gpx>`;
function trkXML(r){
  const pts = (r.points || []).map(p =>
    `      <trkpt lat="${p.lat}" lon="${p.lon}">` +
    (p.alt != null ? `<ele>${p.alt}</ele>` : "") +
    `<time>${new Date(p.t).toISOString()}</time></trkpt>`).join("\n");
  return `  <trk>
    <name>${r.name}</name>
    <trkseg>
${pts}
    </trkseg>
  </trk>`;
}
const toGPX = r => gpxDoc(trkXML(r));
async function shareOrDownload(file, title){
  if (navigator.canShare && navigator.canShare({ files:[file] })){
    try { await navigator.share({ files:[file], title }); return; } catch(e){}
  }
  const a = document.createElement("a");
  a.href = URL.createObjectURL(file); a.download = file.name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}
async function shareGPX(){
  const r = await idbGet(detId); if (!r) return;
  const fname = "ritmeter_" + new Date(r.start).toISOString().slice(0,16).replace(/[:T]/g,"-") + ".gpx";
  shareOrDownload(new File([toGPX(r)], fname, { type:"application/gpx+xml" }), r.name);
}
async function gpxAll(){
  const trips = (await idbAll().catch(() => [])).sort((a,b) => a.id - b.id);
  if (!trips.length) return;
  const xml = gpxDoc(trips.map(trkXML).join("\n"));
  shareOrDownload(new File([xml], "ritmeter_alle_ritten.gpx", { type:"application/gpx+xml" }), "RitMeter");
}
async function backup(){
  const trips = await idbAll().catch(() => []);
  const data = JSON.stringify({ app:"ritmeter", v:1, exported:new Date().toISOString(), trips });
  const fname = "ritmeter_backup_" + new Date().toISOString().slice(0,10) + ".json";
  shareOrDownload(new File([data], fname, { type:"application/json" }), "RitMeter back-up");
}
async function restore(file){
  try{
    const data = JSON.parse(await file.text());
    if (!data || data.app !== "ritmeter" || !Array.isArray(data.trips)) throw new Error();
    let n = 0;
    for (const r of data.trips)
      if (r && r.id && typeof r.dist === "number"){ await idbPut(r); n++; }
    toast(n + " " + t("restored"));
    openHist();
  } catch(e){ toast(t("bad_file")); }
}

/* ── scherm aanhouden (zelfherstellend) ──────────────────── */
let wakeLock = null;
async function keepAwake(){
  if (!("wakeLock" in navigator)) return;
  if (document.visibilityState !== "visible") return;
  try{
    if (wakeLock && !wakeLock.released) return;
    wakeLock = await navigator.wakeLock.request("screen");
    /* iOS geeft de lock soms spontaan vrij: meteen klaarzetten voor heraanvraag */
    wakeLock.addEventListener("release", () => { wakeLock = null; });
  } catch(e){ wakeLock = null; /* o.a. geweigerd in energiebesparingsmodus */ }
}
setInterval(keepAwake, 20000);                       // vangnet
document.addEventListener("pointerdown", keepAwake); // elke aanraking
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") keepAwake();
});

/* ── rotatie vergrendelen op portret (werkt in geïnstalleerde PWA) ── */
async function lockPortrait(){
  try{
    if (screen.orientation && screen.orientation.lock)
      await screen.orientation.lock("portrait");
  } catch(e){ /* in een gewone browsertab niet toegestaan: geen probleem */ }
}
if (screen.orientation) screen.orientation.addEventListener("change", lockPortrait);
document.addEventListener("pointerdown", lockPortrait, { once:true });

   - off-route-detectie met gedebouncede herberekening
   - favorieten in localStorage (rm_fav_nav, max 5)
   ═══════════════════════════════════════════════════════════ */

const PHOTON = "https://photon.komoot.io/api/";
const BROUTER = "https://brouter.de/brouter";
const PROFILE_MAP = { car:"car-fast", bike:"trekking", moped:"moped", snor:"trekking" };
/* km/u: cap = realistische bovengrens, def = vaste schatting bij onbruikbare API-tijd */
const SPEED = { car:{cap:140,def:60}, bike:{cap:35,def:18},
                moped:{cap:50,def:40}, snor:{cap:30,def:25} };

const nav = {
  active:false, profile:"car", dest:null,
  coords:[], cum:[], maneuvers:[], mIdx:0,
  distM:0, etaS:0, vAvg:8, destMarker:null,
  lastNear:null, offSince:null, rerouting:false
};
let navHere = null;                 // laatst bekende GPS-positie {lat,lon}
let navPanelOpenFlag = false;
let geoTimer = null, geoSeq = 0;

/* ── geo-helpers ─────────────────────────────────────────── */
function brg(a, b){                 // peiling a→b in graden (0=N, 90=O)
  const toR = x => x*Math.PI/180, toD = x => x*180/Math.PI;
  const y = Math.sin(toR(b.lon-a.lon)) * Math.cos(toR(b.lat));
  const x = Math.cos(toR(a.lat))*Math.sin(toR(b.lat)) -
            Math.sin(toR(a.lat))*Math.cos(toR(b.lat))*Math.cos(toR(b.lon-a.lon));
  return (toD(Math.atan2(y, x)) + 360) % 360;
}
/* afstand punt→lijnsegment (meters), lokaal vlak rond p */
function segDist(p, a, b){
  const latR = p.lat*Math.PI/180;
  const mLat = 111320, mLon = 111320*Math.cos(latR);
  const ax=(a.lon-p.lon)*mLon, ay=(a.lat-p.lat)*mLat;
  const bx=(b.lon-p.lon)*mLon, by=(b.lat-p.lat)*mLat;
  const dx=bx-ax, dy=by-ay, L2=dx*dx+dy*dy;
  let t = L2>0 ? -((ax*dx+ay*dy)/L2) : 0;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(ax+t*dx, ay+t*dy);
}

/* significante knooppunten (afslagen) uit de routegeometrie.
   Look-back/-ahead over ~18 m dempt flauwe bochten weg, zodat alleen
   echte richtingsveranderingen (>=35°) een afslag worden. */
function detectManeuvers(pts, cum){
  const LOOK = 18, TURN_MIN = 35, MERGE = 25, out = [];
  for (let i = 1; i < pts.length-1; i++){
    let b = i; while (b > 0 && cum[i]-cum[b] < LOOK) b--;
    let f = i; while (f < pts.length-1 && cum[f]-cum[i] < LOOK) f++;
    if (b === i || f === i) continue;
    let d = brg(pts[i], pts[f]) - brg(pts[b], pts[i]);
    while (d > 180) d -= 360;  while (d < -180) d += 360;
    if (Math.abs(d) >= TURN_MIN){
      const last = out[out.length-1];
      if (last && cum[i]-last.dist < MERGE){
        if (Math.abs(d) > Math.abs(last.turn)){
          last.i = i; last.lat = pts[i].lat; last.lon = pts[i].lon;
          last.turn = d; last.dist = cum[i];
        }
      } else out.push({ i, lat:pts[i].lat, lon:pts[i].lon, turn:d, dist:cum[i] });
    }
  }
  return out;
}

/* dichtstbijzijnde route-knooppunt t.o.v. positie (gevensterd voor snelheid) */
function nearestIdx(here){
  const n = nav.coords.length;
  let lo = 0, hi = n;
  if (nav.lastNear != null){ lo = Math.max(0, nav.lastNear-30); hi = Math.min(n, nav.lastNear+120); }
  let best = lo, bd = Infinity;
  for (let i = lo; i < hi; i++){
    const d = hv(here, nav.coords[i]);
    if (d < bd){ bd = d; best = i; }
  }
  nav.lastNear = best;
  return { idx:best, dist:bd };
}
function offRouteDist(here, nearIdx){
  let best = Infinity;
  for (let i = Math.max(0, nearIdx-1); i < Math.min(nav.coords.length-1, nearIdx+1); i++)
    best = Math.min(best, segDist(here, nav.coords[i], nav.coords[i+1]));
  return best === Infinity ? hv(here, nav.coords[nearIdx] || here) : best;
}

/* ── favorieten (localStorage, max 5) ────────────────────── */
function favGet(){ try { return JSON.parse(LS.getItem("rm_fav_nav") || "[]"); } catch { return []; } }
function favSave(list){ LS.setItem("rm_fav_nav", JSON.stringify(list.slice(0,5))); renderFavs(); }
function favAdd(item){
  let list = favGet().filter(f =>
    !(Math.abs(f.lat-item.lat) < 1e-5 && Math.abs(f.lon-item.lon) < 1e-5));
  if (list.length >= 5){ toast(t("nav_fav_full")); list = list.slice(0,4); }
  list.unshift({ name:item.name, lat:item.lat, lon:item.lon });
  favSave(list);
  toast(t("nav_fav_saved"));
}
function favDel(idx){ const list = favGet(); list.splice(idx,1); favSave(list); }
function renderFavs(){
  const box = $("navFavs"); if (!box) return;
  const list = favGet();
  box.innerHTML = "";
  if (!list.length){ const m=document.createElement("div"); m.className="navMsg";
    m.textContent = t("nav_no_favs"); box.appendChild(m); return; }
  list.forEach((f, idx) => {
    const chip = document.createElement("div"); chip.className = "navChip";
    const go = document.createElement("button"); go.className = "navChipGo";
    go.textContent = f.name.split(",")[0]; go.onclick = () => selectDest(f);
    const del = document.createElement("button"); del.className = "navChipX";
    del.textContent = "\u00D7"; del.setAttribute("aria-label", t("del"));
    del.onclick = e => { e.stopPropagation(); favDel(idx); };
    chip.append(go, del); box.appendChild(chip);
  });
}

/* ── geocoding (Photon) ──────────────────────────────────── */
function photonLabel(p){
  const a = [];
  if (p.name) a.push(p.name);
  const street = p.street ? p.street + (p.housenumber ? " "+p.housenumber : "") : null;
  if (street && street !== p.name) a.push(street);
  const city = p.city || p.town || p.village || p.county;
  if (city) a.push(city + (p.postcode ? " "+p.postcode : ""));
  if (p.state && !city) a.push(p.state);
  if (p.country) a.push(p.country);
  return a.filter(Boolean).join(", ") || (p.osm_value || "?");
}
async function geoSearch(q){
  const seq = ++geoSeq;
  const box = $("navResults");
  box.innerHTML = `<div class="navMsg">${t("nav_calc")}</div>`;
  let url = `${PHOTON}?q=${encodeURIComponent(q)}&limit=6`;
  if (navHere) url += `&lat=${navHere.lat.toFixed(4)}&lon=${navHere.lon.toFixed(4)}`;
  try{
    const res = await fetch(url);
    const j = await res.json();
    if (seq !== geoSeq) return;                 // verouderd antwoord
    const items = (j.features || [])
      .filter(f => f.geometry && f.geometry.coordinates)
      .map(f => ({ name: photonLabel(f.properties || {}),
                   lat: +f.geometry.coordinates[1], lon: +f.geometry.coordinates[0] }));
    renderResults(items);
  } catch(e){
    if (seq === geoSeq){ box.innerHTML = ""; const m=document.createElement("div");
      m.className="navMsg"; m.textContent = t("nav_err"); box.appendChild(m); }
  }
}
function renderResults(items){
  const box = $("navResults"); box.innerHTML = "";
  if (!items.length){ const m=document.createElement("div"); m.className="navMsg";
    m.textContent = t("nav_none"); box.appendChild(m); return; }
  items.forEach(it => {
    const b = document.createElement("button"); b.className = "navRes";
    const nm = document.createElement("b"); nm.textContent = it.name.split(",")[0];
    const sub = document.createElement("span");
    sub.textContent = it.name.split(",").slice(1).join(",").trim();
    b.append(nm, sub); b.onclick = () => selectDest(it);
    box.appendChild(b);
  });
}

/* ── routing (BRouter) ───────────────────────────────────── */
function computeEta(distM, apiTimeS, mode){
  const s = SPEED[mode] || SPEED.bike;
  if (mode === "snor") return distM / (25/3.6);          // altijd vaste 25 km/u
  if (!(apiTimeS > 0)) return distM / (s.def/3.6);        // geen API-tijd
  const v = distM / apiTimeS * 3.6;                       // km/u volgens API
  if (v > s.cap || v < 3) return distM / (s.def/3.6);     // onrealistisch → vaste schatting
  return apiTimeS;
}
async function fetchRoute(o, d, mode){
  const prof = PROFILE_MAP[mode] || "trekking";
  const url = `${BROUTER}?lonlats=${o.lon.toFixed(6)},${o.lat.toFixed(6)}|` +
              `${d.lon.toFixed(6)},${d.lat.toFixed(6)}` +
              `&profile=${prof}&alternativeidx=0&format=geojson&exportWaypoints=1`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("brouter " + res.status);
  const j = await res.json();
  const feat = (j.features || []).find(f => f.geometry && f.geometry.type === "LineString");
  if (!feat || !feat.geometry.coordinates.length) throw new Error("geen route");
  const coords = feat.geometry.coordinates.map(c => ({ lon:+c[0], lat:+c[1] }));
  const p = feat.properties || {};
  let distM = parseFloat(p["track-length"]);
  if (!(distM > 0)){ distM = 0; for (let i=1;i<coords.length;i++) distM += hv(coords[i-1], coords[i]); }
  return { coords, distM, etaS: computeEta(distM, parseFloat(p["total-time"]), mode) };
}
function applyRoute(r){
  nav.coords = r.coords;
  nav.cum = [0];
  for (let i = 1; i < r.coords.length; i++) nav.cum[i] = nav.cum[i-1] + hv(r.coords[i-1], r.coords[i]);
  nav.maneuvers = detectManeuvers(r.coords, nav.cum);
  const last = r.coords[r.coords.length-1];
  nav.maneuvers.push({ i:r.coords.length-1, lat:last.lat, lon:last.lon,
                       turn:0, dist:nav.cum[nav.cum.length-1], arrive:true });
  nav.distM = r.distM; nav.etaS = r.etaS;
  nav.vAvg = r.etaS > 0 ? r.distM / r.etaS : (SPEED[nav.profile].def/3.6);
  nav.mIdx = 0; nav.lastNear = null; nav.offSince = null;
  drawNavRoute();
}
async function navComputeRoute(){
  if (!nav.dest) return;
  if (!navHere){ $("navInfo").textContent = t("nav_wait_gps"); return; }
  $("navInfo").textContent = t("nav_calc");
  $("navStart").disabled = true;
  try{
    applyRoute(await fetchRoute(navHere, nav.dest, nav.profile));
    $("navInfo").innerHTML = `<b>${fmtNavDist(nav.distM)}</b> &middot; ${t("eta")} ${fmtEta(nav.etaS)}`;
    $("navStart").disabled = false;
  } catch(e){
    console.error(e);
    $("navInfo").textContent = t("nav_err");
    $("navStart").disabled = true;
  }
}
async function navReroute(){
  if (!navHere || nav.rerouting) return;
  nav.rerouting = true;
  try{ applyRoute(await fetchRoute(navHere, nav.dest, nav.profile)); toast(t("nav_rerouted")); }
  catch(e){ /* oude route behouden */ }
  finally{ nav.rerouting = false; nav.offSince = null; }
}

/* ── route + bestemming op de hoofdkaart ─────────────────── */
function drawNavRoute(){
  if (!map || !mapReady || !nav.coords.length) return;
  const data = { type:"Feature", properties:{},
    geometry:{ type:"LineString", coordinates: nav.coords.map(p => [p.lon, p.lat]) } };
  if (map.getSource("nav-route")) map.getSource("nav-route").setData(data);
  else {
    map.addSource("nav-route", { type:"geojson", data });
    map.addLayer({ id:"nav-route-casing", type:"line", source:"nav-route",
      layout:{ "line-cap":"round", "line-join":"round" },
      paint:{ "line-color":"var(--nav-dark)".replace("var(--nav-dark)","#3A0A33"),
              "line-width":11, "line-opacity":.95 } });
    map.addLayer({ id:"nav-route-line", type:"line", source:"nav-route",
      layout:{ "line-cap":"round", "line-join":"round" },
      paint:{ "line-color":"#E000FF", "line-width":6, "line-opacity":.95 } });
  }
  if (!nav.destMarker){
    const el = document.createElement("div"); el.className = "navDest";
    el.innerHTML = `<svg width="30" height="38" viewBox="0 0 24 30"><path d="M12 0a10 10 0 0 0-10 10c0 7 10 20 10 20s10-13 10-20A10 10 0 0 0 12 0z" fill="#E000FF" stroke="#0B0F14" stroke-width="1.5"/><circle cx="12" cy="10" r="4" fill="#0B0F14"/></svg>`;
    nav.destMarker = new maplibregl.Marker({ element:el, anchor:"bottom" })
      .setLngLat([nav.dest.lon, nav.dest.lat]).addTo(map);
  } else nav.destMarker.setLngLat([nav.dest.lon, nav.dest.lat]).addTo(map);
}
function clearNavRoute(){
  if (map){
    for (const id of ["nav-route-line","nav-route-casing"]) if (map.getLayer(id)) map.removeLayer(id);
    if (map.getSource("nav-route")) map.removeSource("nav-route");
  }
  if (nav.destMarker){ nav.destMarker.remove(); nav.destMarker = null; }
}

/* ── camera-padding: panelen ontwijken, kaart blijft zichtbaar ── */
function navPanelOpen(){ return navPanelOpenFlag; }
function navPadding(){
  if (!map || !mapReady) return;
  const land = window.matchMedia("(orientation: landscape)").matches;
  let pad;
  if (land){
    const left = navPanelOpen() ? Math.min(380, Math.round(window.innerWidth*0.44)) + 20 : 130;
    pad = { top:64, bottom:Math.round(window.innerHeight*0.10)+20, left, right:60 };
  } else {
    const top = Math.round((document.body.classList.contains("navigating") ? 0.42 : 0.45) * window.innerHeight);
    const bottom = navPanelOpen() ? Math.round(window.innerHeight*0.40) : 120;
    pad = { top, bottom, left:24, right:24 };
  }
  map.setPadding(pad);
  if (marker) map.easeTo({ center: marker.getLngLat(), duration:300 });
}

/* ── HUD-weergave ────────────────────────────────────────── */
function setArrow(type){
  const b = '<svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">';
  const I = {
    straight:b+'<path d="M12 20V5"/><path d="M6 11l6-6 6 6"/></svg>',
    left:    b+'<path d="M20 18h-7a4 4 0 0 1-4-4V6"/><path d="M5 10l4-4 4 4"/></svg>',
    right:   b+'<path d="M4 18h7a4 4 0 0 0 4-4V6"/><path d="M19 10l-4-4-4 4"/></svg>',
    arrive:  b+'<circle cx="12" cy="10" r="2.5"/><path d="M12 22s7-6 7-12a7 7 0 1 0-14 0c0 6 7 12 7 12z"/></svg>'
  };
  $("navArrow").innerHTML = I[type] || I.straight;
}
function turnType(m){
  if (!m) return "straight";
  if (m.arrive) return "arrive";
  return m.turn > 0 ? "right" : "left";
}
function fmtNavDist(m){
  if (useMph){
    const ft = m*3.28084;
    if (ft < 1000) return (Math.round(ft/10)*10) + " ft";
    const mi = m/1609.344;
    return (lang === "nl" ? mi.toFixed(1).replace(".",",") : mi.toFixed(1)) + " mi";
  }
  if (m < 1000) return (Math.round(m/10)*10) + " m";
  const km = m/1000;
  return (lang === "nl" ? km.toFixed(1).replace(".",",") : km.toFixed(1)) + " km";
}
function fmtEta(s){
  s = Math.round(s);
  const h = Math.floor(s/3600), m = Math.round((s % 3600)/60);
  return h ? `${h} ${t("eta_hr")} ${m} ${t("eta_min")}`
           : `${Math.max(1, m)} ${t("eta_min")}`;
}
function updateNavHud(){
  const m = nav.maneuvers[nav.mIdx]; if (!m || !navHere) return;
  setArrow(turnType(m));
  $("navDist").textContent = fmtNavDist(hv(navHere, m));
  const rem = Math.max(0, nav.distM - (nav.cum[nav.lastNear] || 0));
  const name = nav.dest ? nav.dest.name.split(",")[0] : "";
  $("navStreet").textContent =
    (m.arrive ? t("nav_arrived") : name) + " \u00B7 " +
    fmtNavDist(rem) + " \u00B7 " + fmtEta(rem / (nav.vAvg || 8));
}

/* ── start / stop / aankomst ─────────────────────────────── */
function navStartGuidance(){
  if (!nav.coords.length) return;
  if (focus){ focus = false; LS.setItem("rm_focus","0"); }
  if (hud){ hud = false; document.body.classList.remove("hud"); }
  applyMode();                                  // verwijdert focusmode, kaart zichtbaar + resize
  syncSettingsUI();
  nav.active = true; nav.mIdx = 0; nav.lastNear = null; nav.offSince = null;
  document.body.classList.add("navigating");
  closeNavPanel();
  $("navHud").classList.add("show");
  drawNavRoute();
  setArrow(turnType(nav.maneuvers[0]));
  if (map) setTimeout(() => map.resize(), 60);
  navPadding(); render();
}
function navStop(){
  nav.active = false;
  document.body.classList.remove("navigating");
  $("navHud").classList.remove("show");
  clearNavRoute();
  navPadding();
}
function navArrived(){
  toast(t("nav_arrived"));
  setArrow("arrive");
  $("navDist").textContent = fmtNavDist(0);
  $("navStreet").textContent = t("nav_arrived");
  nav.active = false;
  document.body.classList.remove("navigating");
  setTimeout(() => { $("navHud").classList.remove("show"); clearNavRoute(); navPadding(); }, 5000);
}

/* ── per GPS-fix aangeroepen vanuit onFix() ──────────────── */
function navOnFix(c){
  navHere = { lat:c.latitude, lon:c.longitude };
  if (nav.coords.length && map && mapReady && !map.getSource("nav-route")) drawNavRoute();
  if (!nav.active || !nav.maneuvers.length) return;

  const near = nearestIdx(navHere);
  /* schuif door naar de eerstvolgende afslag vóór ons */
  while (nav.mIdx < nav.maneuvers.length-1 && nav.maneuvers[nav.mIdx].i <= near.idx) nav.mIdx++;
  const m = nav.maneuvers[nav.mIdx];
  const dToM = hv(navHere, m);                  // afstand tot eerstvolgend knooppunt (haversine)

  if (m.arrive && dToM < 25){ navArrived(); return; }
  updateNavHud();

  /* off-route → na 8 s gedebounced herberekenen */
  const off = offRouteDist(navHere, near.idx);
  if (off > 55){
    if (nav.offSince === null) nav.offSince = Date.now();
    else if (Date.now()-nav.offSince > 8000 && !nav.rerouting){ nav.offSince = Date.now(); navReroute(); }
  } else nav.offSince = null;
}

/* ── selecteren & paneelbediening ────────────────────────── */
function selectDest(item){
  nav.dest = item;
  $("navSearch").value = item.name.split(",")[0];
  $("navResults").innerHTML = "";
  $("navSaveFav").style.display = "grid";
  navComputeRoute();
}
function openNavPanel(){ navPanelOpenFlag = true; $("navPanel").classList.add("show"); renderFavs(); navPadding(); }
function closeNavPanel(){ navPanelOpenFlag = false; $("navPanel").classList.remove("show"); navPadding(); }

/* ── event-bindings ──────────────────────────────────────── */
$("navBtn").onclick = openNavPanel;
$("navClose").onclick = closeNavPanel;
$("navStopBtn").onclick = navStop;
$("navStart").onclick = navStartGuidance;
$("navSaveFav").onclick = () => { if (nav.dest) favAdd(nav.dest); };
$("navSearch").addEventListener("input", e => {
  clearTimeout(geoTimer);
  const q = e.target.value.trim();
  if (q.length < 3){ $("navResults").innerHTML = ""; return; }
  geoTimer = setTimeout(() => geoSearch(q), 350);   // throttle: respecteer Photon fair-use
});
$("navSearch").addEventListener("keydown", e => {
  if (e.key === "Enter"){ clearTimeout(geoTimer);
    const q = e.target.value.trim(); if (q.length >= 2) geoSearch(q); }
});
document.querySelectorAll("#navProfiles button").forEach(b => {
  b.onclick = () => {
    nav.profile = b.dataset.p;
    document.querySelectorAll("#navProfiles button").forEach(x => x.classList.toggle("on", x === b));
    if (nav.dest) navComputeRoute();
  };
});
window.addEventListener("resize", () => { if (map){ map.resize(); navPadding(); } });
if (screen.orientation)
  screen.orientation.addEventListener("change",
    () => setTimeout(() => { if (map){ map.resize(); navPadding(); } }, 250));

/* labels/placeholders meteen zetten (applyLang draaide al bij init) */
$("navSearch").placeholder = t("nav_search");
$("navStart").textContent  = t("nav_start");
(function(){ const pl={car:t("p_car"),bike:t("p_bike"),moped:t("p_moped"),snor:t("p_snor")};
  document.querySelectorAll("#navProfiles button").forEach(b => b.textContent = pl[b.dataset.p]); })();
</script>
