<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0B0F14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RitMeter">
<title>RitMeter — GPS snelheid &amp; trip</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   RitMeter — UI-laag (herbouw)
   Discipline:
   - zichtbaarheid UITSLUITEND via body[data-*]-selectors
   - geometrie (positie/grootte) UITSLUITEND in de twee
     oriëntatie-layouts (@media), niet in de modus
   - geen !important, geen specificiteit-gevechten
   ═══════════════════════════════════════════════════════════ */

:root{
  --bg:#0B0F14;
  --panel:rgba(13,19,26,.82);
  --line:#22303E;
  --text:#E9EEF3;
  --muted:#7E8B98;
  --amber:#FFB300;
  --digit:#FFB300;          /* instelbare cijferkleur (token, in render gezet) */
  --nav:#E000FF;
  --nav-dark:#3A0A33;
  --ok:#3AD673;
  --warn:#FFB300;
  --bad:#FF5252;
  --radius:18px;
  --dim-opacity:0;          /* nachtdimmer (token, in render gezet) */
  --speed-size:72px;        /* per oriëntatie + presentatie gezet */
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);
  --sar:env(safe-area-inset-right,0px);
   --ui: 1;
  --fab: calc(42px * var(--ui));
  --compass: calc(60px * var(--ui));
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;touch-action:manipulation;
  user-select:none;-webkit-user-select:none}
button{font:inherit;color:inherit;background:none;border:none;padding:0;cursor:pointer}

/* ── kaart: basislaag ─────────────────────────────────────── */
#map{position:fixed;inset:0;background:#0B0F14}
.maplibregl-ctrl-attrib{font-size:10px;background:rgba(11,15,20,.6)!important;color:#9aa7b4}
.maplibregl-ctrl-attrib a{color:#9aa7b4!important}

/* ── positiemarker ── */
.me{width:46px;height:46px;position:relative}
.me::before{content:"";position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle,rgba(255,179,0,.35),transparent 70%)}
.me svg{position:absolute;inset:8px;filter:drop-shadow(0 1px 4px rgba(0,0,0,.6))}
.navDest svg{filter:drop-shadow(0 2px 4px rgba(0,0,0,.6))}

/* ═══ UI-overlay: één grid over de kaart ═══════════════════
   pointer-events:none zodat de kaart sleepbaar blijft;
   interactieve regio's zetten pointer-events weer aan.        */
#ui{position:fixed;inset:0;z-index:10;display:grid;pointer-events:none;
  padding:calc(var(--sat) + 10px) calc(var(--sar) + 14px)
          calc(var(--sab) + 10px) calc(var(--sal) + 14px);
  gap:10px}
#ui > *{pointer-events:none;min-width:0}
/* alleen echte bedienelementen vangen aanrakingen op; lege regio's (kompas,
   snelheid, status, de hele linker-/onderstrook) laten ze door naar de kaart */
.fab,#unitBtn,#r-recenter,#r-trip,#r-navinfo,#navPanel{pointer-events:auto}

/* ── appearance per regio (look, NIET geometrie/zichtbaarheid) ── */
.panel{background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--line)}

/* knoppenrail */
#r-controls{display:flex;flex-direction:column;gap:10px}
.fab svg{width:48%;height:48%}
.fab{width:var(--fab);height:var(--fab);border-radius:50%;background:var(--panel);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--line);display:grid;place-items:center;color:var(--muted)}
.fab:active{color:var(--amber)}
#navBtn:active{color:var(--nav)}

/* snelheidscluster */
#r-speed{align-self:start;justify-self:center;text-align:center;
  background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--line);border-radius:var(--radius);
  padding:8px 26px 12px;min-width:196px;box-shadow:0 6px 24px rgba(0,0,0,.45)}
#speedVal{font-family:"Chakra Petch",system-ui,sans-serif;font-weight:700;
  font-size:var(--speed-size);line-height:1;letter-spacing:.5px;color:var(--text);
  font-variant-numeric:tabular-nums}
#speedVal.moving{color:var(--digit)}
#unitBtn{display:block;margin:2px auto 0;font-size:14px;font-weight:600;letter-spacing:.22em;
  color:var(--muted);text-transform:uppercase;padding:4px 14px;border-radius:99px}
#unitBtn:active{color:var(--amber)}

/* gps-status */
#r-status{justify-self:end;align-self:start;display:flex;align-items:center;gap:7px;
  background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--line);border-radius:99px;padding:7px 13px;font-size:12px;color:var(--muted)}
#gpsDot{width:9px;height:9px;border-radius:50%;background:var(--bad);transition:background .3s}
#gpsDot.ok{background:var(--ok)}#gpsDot.mid{background:var(--warn)}

/* kompasroos */
#r-compass{justify-self:end;align-self:start;width:var(--compass);height:var(--compass);
  border-radius:50%;background:var(--panel);backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);border:1px solid var(--line)}
#r-compass svg{width:100%;height:100%;display:block}
#r-compass text{font:700 11px system-ui;fill:var(--muted)}
#r-compass .n{fill:var(--amber)}
#roseG{transform-origin:30px 30px;transition:transform .6s linear}

/* hoogte & koers */
#r-altitude{justify-self:center;align-self:start;display:flex;gap:18px;
  background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--line);border-radius:99px;padding:8px 18px;
  font-family:"Chakra Petch",sans-serif;font-size:16px;font-variant-numeric:tabular-nums;
  color:var(--text);white-space:nowrap}
#r-altitude .lbl{color:var(--muted);font-family:system-ui,sans-serif;font-size:11px;
  letter-spacing:.12em;text-transform:uppercase;margin-right:6px;vertical-align:1px}

/* centreerknop */
#r-recenter{justify-self:end;align-self:end}
#r-zoom{justify-self:end;align-self:start;display:flex;flex-direction:column;gap:10px}
#zoomIn:active,#zoomOut:active{color:var(--amber)}
#r-recenter:active{color:var(--amber)}

/* nav-info: rustige regel met resterende afstand + ETA */
#r-navinfo{align-self:end;display:flex;align-items:center;gap:calc(10px * var(--ui));
  background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--nav);border-radius:99px;
  padding:calc(8px * var(--ui)) calc(14px * var(--ui));
  font-size:calc(14px * var(--ui));color:var(--text);font-variant-numeric:tabular-nums;
  box-shadow:0 4px 16px rgba(0,0,0,.4)}
#r-navinfo .nf{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#r-navinfo b{font-family:"Chakra Petch",sans-serif;font-size:calc(17px * var(--ui));color:var(--text)}
#navRecalc{flex:none;width:calc(34px * var(--ui));height:calc(34px * var(--ui));border-radius:50%;
  display:grid;place-items:center;background:#141C25;border:1px solid var(--line);color:var(--muted)}
#navRecalc:active{color:var(--nav)}
#navStopBtn{flex:none;width:calc(34px * var(--ui));height:calc(34px * var(--ui));border-radius:50%;
  display:grid;place-items:center;background:#2A1313;border:1px solid #5c2727;color:#FF8A8A;
  font-size:calc(20px * var(--ui));line-height:1}

/* tripbalk */
#r-trip{align-self:end;background:var(--panel);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--line);border-radius:var(--radius);
  padding:12px 14px;box-shadow:0 6px 24px rgba(0,0,0,.45)}
#stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;text-align:center}
.stat b{display:block;font-family:"Chakra Petch",sans-serif;font-weight:600;font-size:21px;
  font-variant-numeric:tabular-nums;color:var(--text)}
.stat span{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
#btnRow{display:flex;gap:10px}
.btn{flex:1;padding:13px 0;border-radius:13px;font-weight:700;font-size:16px;letter-spacing:.04em;
  border:1px solid var(--line);background:#141C25;transition:transform .06s}
.btn:active{transform:scale(.97)}
#startBtn.go{background:var(--amber);border-color:var(--amber);color:#1A1200}
#startBtn.halt{background:#2A1313;border-color:#5c2727;color:#FF8A8A}
#resetBtn{flex:0 0 auto;padding-left:16px;padding-right:16px;color:var(--muted)}
#resetBtn:disabled{opacity:.35}
   /* na 'Stop': rit staat op pauze en is nog niet opgeslagen →
   Opslaan+reset wordt de primaire actie (amber gevuld),
   Hervat wordt secundair (amber contour) zodat de keuze duidelijk is */
body[data-measuring="paused"] #resetBtn:not(:disabled){
  opacity:1;color:#1A1200;background:var(--amber);border-color:var(--amber);
  animation:savePulse 1.6s ease-in-out infinite}
body[data-measuring="paused"] #startBtn.go{background:transparent;color:var(--amber)}
@keyframes savePulse{
  0%,100%{box-shadow:0 0 0 0 rgba(255,179,0,.45)}
  50%{box-shadow:0 0 0 6px rgba(255,179,0,0)}}
/* compactere tripbalk tijdens route (alleen appearance) */
body[data-nav="route"] #stats{margin-bottom:8px;gap:5px}
body[data-nav="route"] .stat b{font-size:17px}
body[data-nav="route"] .btn{padding-top:10px;padding-bottom:10px;font-size:14px}

/* schermvullend tikvlak om uit groot-getal te gaan */
#r-exit{position:fixed;inset:0;z-index:11;background:transparent}
#r-exit #exitHint{position:absolute;left:0;right:0;bottom:calc(var(--sab) + 18px);
  text-align:center;color:var(--muted);font-size:13px;letter-spacing:.08em}

/* nachtdimmer: bovenop alles, vangt geen tikken */
#dim{position:fixed;inset:0;z-index:65;background:#000;opacity:var(--dim-opacity);pointer-events:none}

/* ═══ ZICHTBAARHEID — uitsluitend body[data-*] ═════════════
   Elk eindresultaat wordt door precies één winnende regel
   bepaald; geen volgorde-afhankelijke override-stapels.      */

/* groot-getal verbergt de hele kaart-chrome */
body[data-presentation="big"] #map,
body[data-presentation="big"] #r-controls,
body[data-presentation="big"] #r-status,
body[data-presentation="big"] #r-compass,
body[data-presentation="big"] #r-altitude,
body[data-presentation="big"] #r-trip,
body[data-presentation="big"] #r-navinfo,
body[data-presentation="big"] #r-recenter,
body[data-presentation="big"] #navPanel{display:none}

/* kompas & hoogte: alleen in kaart-stand én als voorkeur aan */
#r-compass{display:none}
body[data-presentation="map"][data-compass="on"] #r-compass{display:block}
#r-altitude{display:none}
body[data-presentation="map"][data-altitude="on"] #r-altitude{display:flex}

/* centreerknop: alleen in kaart-stand én als de kaart versleept is */
#r-recenter{display:none}
body[data-presentation="map"][data-dragged="yes"] #r-recenter{display:grid}

/* zoomknoppen: alleen in kaart-stand (handig op autoschermen zonder pinch) */
#r-zoom{display:none}
body[data-presentation="map"] #r-zoom{display:flex}

/* nav-info: alleen in kaart-stand tijdens route */
#r-navinfo{display:none}
body[data-presentation="map"][data-nav="route"] #r-navinfo{display:flex}

/* zoekpaneel: alleen in kaart-stand tijdens search (slide via transform) */
body[data-presentation="map"][data-nav="search"] #navPanel{transform:none}

/* schermvullend tikvlak: alleen in groot-getal */
#r-exit{display:none}
body[data-presentation="big"] #r-exit{display:block}

/* groot-getal: snelheid centreren + vergroten; spiegelen alleen hier */
body[data-presentation="big"] #r-speed{grid-area:1 / 1 / -1 / -1;place-self:center;
  background:transparent;border:none;box-shadow:none;backdrop-filter:none;-webkit-backdrop-filter:none}
body[data-presentation="big"] #unitBtn{font-size:20px;pointer-events:none}
body[data-presentation="big"][data-mirror="on"] #speedVal{transform:scaleX(-1)}

/* modale overlays */
#settings,#hist,#detail{display:none}
body[data-overlay="settings"] #settings{display:grid}
body[data-overlay="history"] #hist{display:flex}
body[data-overlay="detail"] #detail{display:flex}

/* ═══ LAYOUT A — PORTRET (volledige, op zichzelf staande plattegrond) ═══ */
@media (orientation:portrait){
  :root{--speed-size:72px}
  body[data-presentation="big"]{--speed-size:min(46vw,210px)}

  #ui{
    grid-template-columns:auto 1fr auto;
    grid-template-rows:auto auto auto 1fr auto auto;
    grid-template-areas:
      "controls speed    status"
      "controls altitude compass"
      "controls .        zoom"
      "controls .        recenter"
      "navinfo  navinfo  navinfo"
      "trip     trip     trip";
  }
  #r-controls{grid-area:controls}
  #r-speed{grid-area:speed}
  #r-status{grid-area:status}
  #r-compass{grid-area:compass}
  #r-zoom{grid-area:zoom}
  #r-altitude{grid-area:altitude}
  #r-recenter{grid-area:recenter}
  #r-navinfo{grid-area:navinfo}
  #r-trip{grid-area:trip}

  /* zoekpaneel = bottom sheet */
  #navPanel{position:fixed;left:0;right:0;bottom:0;
    border-radius:var(--radius) var(--radius) 0 0;border-top:1px solid var(--line);
    transform:translateY(110%)}
}

/* ═══ LAYOUT B — LIGGEND (volledige, op zichzelf staande plattegrond) ═══ */
@media (orientation:landscape){
  :root{--speed-size:46px}
  body[data-presentation="big"]{--speed-size:min(48vh,230px)}

  #ui{
    grid-template-columns:auto auto 1fr auto;
    grid-template-rows:auto auto auto 1fr auto;
    grid-template-areas:
      "controls speed    .       status"
      "controls .        .       compass"
      "controls .        .       zoom"
      "controls trip     .       recenter"
      "controls trip     navinfo navinfo";
  }
  #r-controls{grid-area:controls}
  #r-speed{grid-area:speed;justify-self:start;min-width:0;padding:6px 18px 8px}
  #r-status{grid-area:status}
  #r-compass{grid-area:compass}
  #r-zoom{grid-area:zoom}
  #r-altitude{display:none}                 /* hoogte-uitlezing alleen relevant in portret */
  #r-recenter{grid-area:recenter}
  #r-navinfo{grid-area:navinfo;justify-self:end;max-width:min(calc(360px * var(--ui)),46vw)}
  #r-trip{grid-area:trip;align-self:end;justify-self:start;width:min(calc(440px * var(--ui)),46vw)}
  #r-trip #stats{margin-bottom:8px;gap:5px}
  #r-trip .stat b{font-size:calc(16.5px * var(--ui))}
  #r-trip .stat span{font-size:calc(10px * var(--ui))}
  #r-trip .btn{padding-top:10px;padding-bottom:10px;font-size:calc(14px * var(--ui))}

  /* in liggend toont hoogte/kompas niet via voorkeur; herstel kompas alleen */
  body[data-presentation="map"][data-altitude="on"] #r-altitude{display:none}

  /* zoekpaneel = linker kolom */
  #navPanel{position:fixed;left:calc(var(--sal) + 10px);right:auto;
    top:calc(var(--sat) + 10px);bottom:calc(var(--sab) + 10px);
    width:min(380px,44vw);border-radius:var(--radius);border:1px solid var(--line);
    transform:translateX(-115%)}
}

/* ── zoekpaneel (bottom sheet / linker kolom) ── */
#navPanel{z-index:55;background:#10161E;
  padding:10px 16px calc(var(--sab) + 16px);max-height:76vh;overflow-y:auto;
  transition:transform .28s ease;box-shadow:0 -8px 30px rgba(0,0,0,.5)}
.navGrip{width:42px;height:5px;border-radius:99px;background:var(--line);margin:2px auto 12px}
.navTop{display:flex;gap:10px;align-items:center;margin-bottom:10px}
#navSearch{flex:1;min-width:0;background:#0B0F14;border:1px solid var(--line);
  border-radius:12px;padding:12px 14px;color:var(--text);font-size:16px;outline:none}
#navSearch:focus{border-color:var(--nav)}
.navX{width:40px;height:40px;flex:none;border-radius:12px;background:#141C25;
  border:1px solid var(--line);font-size:22px;line-height:1;color:var(--muted);
  display:grid;place-items:center}
.navX:active{color:var(--nav)}
#navResults:empty,#navFavs:empty{display:none}
.navRes{width:100%;display:block;text-align:left;padding:11px 12px;border-bottom:1px solid var(--line)}
.navRes b{display:block;font-size:15px;font-weight:600;color:var(--text)}
.navRes span{display:block;font-size:12.5px;color:var(--muted);margin-top:2px}
.navRes:active{background:#141C25}
.navMsg{color:var(--muted);font-size:13px;padding:10px 2px}
#navFavs{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 4px}
.navChip{display:flex;align-items:center;background:#141C25;border:1px solid var(--line);
  border-radius:99px;overflow:hidden}
.navChipGo{padding:9px 6px 9px 14px;font-size:13.5px;font-weight:600;color:var(--text);
  max-width:46vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.navChipX{padding:9px 12px 9px 6px;font-size:15px;color:var(--muted)}
.navChipX:active{color:var(--bad)}
.navInfo{margin:12px 0;min-height:20px;font-size:14px;color:var(--muted);font-variant-numeric:tabular-nums}
.navInfo b{font-family:"Chakra Petch",sans-serif;font-size:18px;color:var(--text)}
.navBtns{display:flex;gap:10px}
#navStart{flex:1;padding:14px 0;border-radius:13px;background:var(--nav);
  color:#fff;font-weight:700;font-size:16px;border:1px solid var(--nav)}
#navStart:disabled{opacity:.4;background:#141C25;border-color:var(--line);color:var(--muted)}
#navSaveFav{flex:0 0 auto;width:52px;border-radius:13px;background:#141C25;
  border:1px solid var(--line);font-size:20px;color:var(--text);display:none;place-items:center}
#navSaveFav.show{display:grid}
#navSaveFav svg{fill:none}
#navSaveFav.on{color:var(--amber)}
#navSaveFav.on svg{fill:var(--amber)}

/* ── instellingen ── */
#settings{position:fixed;inset:0;z-index:60;place-items:end center;background:rgba(5,8,11,.6)}
#setCard{width:100%;max-width:430px;background:#10161E;border:1px solid var(--line);
  border-radius:var(--radius) var(--radius) 0 0;max-height:82vh;overflow-y:auto;
  padding:20px 20px calc(var(--sab) + 20px)}
#setCard h2{margin:0 0 14px;font-family:"Chakra Petch",sans-serif;font-size:19px;
  letter-spacing:.04em;color:var(--text)}
.row{display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:13px 0;border-top:1px solid var(--line)}
.row .info b{display:block;font-size:15px;font-weight:600}
.row .info span{font-size:12.5px;color:var(--muted);line-height:1.35;display:block;margin-top:2px}
.seg{display:flex;background:#0B0F14;border:1px solid var(--line);border-radius:11px;padding:3px;flex:none}
.seg button{padding:7px 16px;border-radius:8px;font-size:13.5px;font-weight:700;color:var(--muted)}
.seg button.on{background:var(--amber);color:#1A1200}
.switch{flex:none;width:50px;height:29px;border-radius:99px;background:#1A232E;
  border:1px solid var(--line);position:relative;transition:background .2s}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:23px;height:23px;
  border-radius:50%;background:var(--muted);transition:transform .2s,background .2s}
.switch.on{background:var(--amber)}
.switch.on::after{transform:translateX(21px);background:#1A1200}
.swatches{display:flex;gap:10px;flex:none}
.sw{width:30px;height:30px;border-radius:50%;border:2px solid transparent}
.sw.on{border-color:#fff}
input[type=range]{accent-color:var(--amber);width:130px;flex:none}
#vehSeg{display:flex;gap:4px;background:#0B0F14;border:1px solid var(--line);border-radius:11px;padding:3px}
#vehSeg button{flex:1;padding:8px 4px;border-radius:8px;font-size:12.5px;font-weight:700;
  color:var(--muted);white-space:nowrap}
#vehSeg button.on{background:var(--amber);color:#1A1200}
#setClose{display:block;width:100%;margin-top:18px;padding:13px 0;border-radius:13px;
  background:var(--amber);color:#1A1200;font-weight:700;font-size:16px}

/* ── geschiedenis & ritdetail ── */
.page{position:fixed;inset:0;z-index:58;flex-direction:column;background:var(--bg)}
.pageHead{display:flex;align-items:center;gap:12px;
  padding:calc(var(--sat) + 14px) 16px 12px;border-bottom:1px solid var(--line)}
.pageHead h2{margin:0;font-family:"Chakra Petch",sans-serif;font-size:18px;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pageHead .fab{width:38px;height:38px}
.pageBody{flex:1;overflow-y:auto;padding:14px 16px calc(var(--sab) + 16px)}
#histActs{display:flex;gap:8px;margin-bottom:14px}
.hbtn{flex:1;padding:10px 6px;border-radius:11px;background:#141C25;
  border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--text)}
.hbtn:active{color:var(--amber)}
#histTotals{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.tot{background:#10161E;border:1px solid var(--line);border-radius:13px;padding:10px 6px;text-align:center}
.tot span{display:block;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.tot b{display:block;font-family:"Chakra Petch",sans-serif;font-size:15px;
  font-variant-numeric:tabular-nums;margin-top:3px}
.tot i{font-style:normal;font-size:10.5px;color:var(--muted)}
.hrow{width:100%;display:flex;justify-content:space-between;align-items:center;gap:12px;
  text-align:left;padding:14px 2px;border-bottom:1px solid var(--line)}
.hrow .l b{display:block;font-size:15px;font-weight:600}
.hrow .l span,.hrow .r span{font-size:12px;color:var(--muted)}
.hrow .r{text-align:right}
.hrow .r b{display:block;font-family:"Chakra Petch",sans-serif;font-size:18px;
  font-variant-numeric:tabular-nums;color:var(--amber)}
#histEmpty{color:var(--muted);font-size:14px;line-height:1.5;padding:24px 6px;text-align:center}
#detStats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
#detStats .stat{background:#10161E;border:1px solid var(--line);border-radius:13px;
  padding:12px 10px;text-align:center}
#dmap{height:240px;border-radius:13px;overflow:hidden;border:1px solid var(--line);
  background:#10161E;margin-bottom:14px}
#profWrap{background:#10161E;border:1px solid var(--line);border-radius:13px;padding:12px;margin-bottom:14px}
#profWrap h3{margin:0 0 8px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);font-weight:600}
#profile{width:100%;height:140px;display:block}
#profNote{color:var(--muted);font-size:13px;margin:6px 0 0;display:none}
.actRow{display:flex;gap:10px}
#shareBtn{flex:1;padding:13px 0;border-radius:13px;background:var(--amber);
  color:#1A1200;font-weight:700;font-size:15px}
#delBtn{flex:0 0 auto;padding:13px 18px;border-radius:13px;background:#2A1313;
  border:1px solid #5c2727;color:#FF8A8A;font-weight:700;font-size:15px}

/* ── toast & meldingen ── */
#toast{position:fixed;left:50%;bottom:calc(var(--sab) + 110px);
  transform:translateX(-50%) translateY(10px);z-index:80;background:#1A232E;
  border:1px solid var(--line);border-radius:99px;padding:10px 20px;font-size:14px;
  font-weight:600;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#notice{position:fixed;inset:0;z-index:70;display:none;place-items:center;
  background:rgba(11,15,20,.92);padding:30px;text-align:center}
#notice.show{display:grid}
#notice .card{max-width:340px}
#notice h2{font-family:"Chakra Petch",sans-serif;color:var(--amber);margin:0 0 10px}
#notice p{color:var(--muted);line-height:1.5;font-size:15px}
#notice button{margin-top:16px;padding:12px 28px;border-radius:13px;background:var(--amber);
  color:#1A1200;font-weight:700}
   /* Head-unit / CarPlay: groot, vast, lage pixeldichtheid.
   Carluex meet 1440×516@1; telefoons (402@3, 384@2) vallen op breedte én DPR buiten de boot. */
@media (min-width:700px) and (min-height:460px) and (max-resolution:1.5dppx){
  :root{ --ui: 1.7 }
}

    eta:"ETA", nav_start:"Start navigation", nav_calc:"Calculating route\u2026",
    nav_err:"Could not find a route", nav_none:"No results",
    nav_no_favs:"No saved places yet", nav_wait_gps:"Waiting for GPS\u2026",
    nav_arrived:"Arrived", nav_fav_saved:"Place saved", nav_fav_full:"Maximum of 5 places",
    nav_rerouted:"Route recalculated",
    eta_hr:"hr", eta_min:"min", remaining:"left"
  }
};
const t   = k => I18N[lang][k];
const loc = () => lang === "nl" ? "nl-NL" : "en-GB";

/* ── trip-toestand (afgeleid: measuring) ─────────────────── */
const trip = Object.assign(
  { running:false, dist:0, ms:0, max:0, start:0, accSum:0, accN:0 },
  JSON.parse(LS.getItem("rm_trip") || "{}"),
  { running:false }
);
let route = trip.ms > 0 ? JSON.parse(LS.getItem("rm_route") || "[]") : [];
function measuring(){
  if (trip.running) return (autoPause && isPaused) ? "paused" : "running";
  return trip.ms ? "paused" : "idle";
}

let lastPos = null, lastSample = null, fixBuf = [], dispSpeed = 0;
let lastBearing = null, lastAltRaw = null, lastFixTime = 0, lastLat = null, lastLon = null;
let lastMotion = 0;
const GEOID_NL = 43;
let altOffset = parseFloat(LS.getItem("rm_altoff"));
if (!isFinite(altOffset)) altOffset = GEOID_NL;
const NL_BOX = { latMin:50.6, latMax:53.7, lonMin:3.2, lonMax:7.4 };
const inNL = (lat, lon) => lat != null && lat >= NL_BOX.latMin && lat <= NL_BOX.latMax
                                       && lon >= NL_BOX.lonMin && lon <= NL_BOX.lonMax;
let isPaused = false, zeroSince = null;

/* ── helpers ─────────────────────────────────────────────── */
const R = 6371000;
function haversine(a, b){
  const toR = x => x * Math.PI / 180;
  const dLat = toR(b.latitude - a.latitude), dLon = toR(b.longitude - a.longitude);
  const s = Math.sin(dLat/2)**2 +
            Math.cos(toR(a.latitude)) * Math.cos(toR(b.latitude)) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(s));
}
const hv = (p, q) => haversine({latitude:p.lat, longitude:p.lon}, {latitude:q.lat, longitude:q.lon});
const unitLbl  = () => useMph ? t("unit_mph") : t("unit_kmh");
const fmtSpeed = ms => Math.round(ms * (useMph ? 2.23694 : 3.6));
const fmtDist  = m  => {
  const v = useMph ? (m/1609.344).toFixed(2) : (m/1000).toFixed(2);
  return lang === "nl" ? v.replace(".", ",") : v;
};
function fmtTime(ms){
  const s = Math.floor(ms/1000), h = Math.floor(s/3600), m = Math.floor(s%3600/60);
  return h ? `${h}:${String(m).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`
           : `${m}:${String(s%60).padStart(2,"0")}`;
}
const cardinal = deg => t("cards")[Math.round(((deg % 360) + 360) % 360 / 45) % 8];
function toast(msg){
  $("toast").textContent = msg;
  $("toast").classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => $("toast").classList.remove("show"), 2000);
}

/* ── IndexedDB ───────────────────────────────────────────── */
let dbP = null;
function db(){
  if (!dbP) dbP = new Promise((res, rej) => {
    const rq = indexedDB.open("ritmeter", 1);
    rq.onupgradeneeded = () => rq.result.createObjectStore("trips", { keyPath:"id" });
    rq.onsuccess = () => res(rq.result);
    rq.onerror   = () => rej(rq.error);
  });
  return dbP;
}
const txs = (d, mode) => d.transaction("trips", mode).objectStore("trips");
const idbPut = rec => db().then(d => new Promise((res, rej) => {
  const r = txs(d, "readwrite").put(rec); r.onsuccess = res; r.onerror = () => rej(r.error);
}));
const idbAll = () => db().then(d => new Promise((res, rej) => {
  const r = txs(d, "readonly").getAll(); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
}));
const idbGet = id => db().then(d => new Promise((res, rej) => {
  const r = txs(d, "readonly").get(id); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
}));
const idbDel = id => db().then(d => new Promise((res, rej) => {
  const r = txs(d, "readwrite").delete(id); r.onsuccess = res; r.onerror = () => rej(r.error);
}));

/* ═══ HET RENDER-CONTRACT ══════════════════════════════════
   1) body-data-attributen uit state  2) inhoud  3) kaart-padding
   Niets anders in de app raakt zichtbaarheid aan.            */
function render(){
  const b = document.body;
  b.dataset.presentation = state.presentation;
  b.dataset.mirror       = state.mirror ? "on" : "off";
  b.dataset.nav          = state.nav;          /* CSS gate't dit achter data-presentation="map" */
  b.dataset.measuring    = measuring();
  b.dataset.overlay      = state.overlay;
  b.dataset.compass      = showCompass  ? "on" : "off";
  b.dataset.altitude     = showAltitude ? "on" : "off";
  b.dataset.dragged      = following ? "no" : "yes";
  document.documentElement.style.setProperty("--digit", COLORS[digitColor]);
  document.documentElement.style.setProperty("--dim-opacity", dimVal);

  /* snelheid */
  const sv = $("speedVal");
  sv.textContent = firstFix ? fmtSpeed(dispSpeed) : "--";
  sv.classList.toggle("moving", dispSpeed > .4);
  $("unitBtn").textContent = unitLbl();

  /* trip-cijfers */
  $("stDist").textContent = fmtDist(trip.dist);
  $("stTime").textContent = fmtTime(trip.ms);
  const avg = trip.ms > 3000 ? trip.dist / (trip.ms/1000) : 0;
  $("stAvg").textContent  = fmtSpeed(avg);
  $("stMax").textContent  = fmtSpeed(trip.max);
  $("stDistU").textContent = useMph ? "mi" : "km";
  $("stTimeU").textContent = t("time") + (trip.running && isPaused && autoPause ? " ⏸" : "");
  $("stAvgU").textContent  = t("avg") + " " + unitLbl();
  $("stMaxU").textContent  = t("max") + " " + unitLbl();
  $("startBtn").textContent = trip.running ? t("stop") : (trip.ms ? t("resume") : t("start"));
  $("startBtn").className   = "btn " + (trip.running ? "halt" : "go");
  $("resetBtn").textContent = trip.dist >= 100 ? t("save_reset") : t("reset");
  $("resetBtn").disabled    = trip.running || !trip.ms;

  /* hoogte & koers (uitlezing) */
  const napAlt = lastAltRaw == null ? null : lastAltRaw - altOffset;
  $("lblAlt").textContent = lastLat == null ? t("alt")
    : inNL(lastLat, lastLon) ? t("alt_nap") : t("alt_msl");
  $("altVal").textContent = napAlt == null ? "—"
    : useMph ? Math.round(napAlt * 3.28084) + " ft" : Math.round(napAlt) + " m";
  $("hdgVal").textContent = lastBearing == null ? "—"
    : Math.round(lastBearing) + "° " + cardinal(lastBearing);
  if (lastBearing != null) $("roseG").style.transform = `rotate(${-lastBearing}deg)`;

  /* nav-info-regel (resterende afstand + rijtijd + aankomsttijd) */
  if (state.nav === "route" && nav.coords.length){
    $("navInfoTxt").innerHTML =
      `<b>${fmtNavDist(nav.remM)}</b> &middot; ${fmtEta(nav.remEtaS)}` +
      ` &middot; ${t("eta")} <b>${fmtArrival(nav.remEtaS)}</b>`;
  }

  /* groot-getal-hint */
  $("exitHint").textContent = t("exit_hint");
}

/* kaart-padding uit de werkelijke hoogte van het zichtbare onderpaneel */
function applyMapPadding(){
  if (!map || !mapReady) return;
  const land = matchMedia("(orientation: landscape)").matches;
  const tripH = state.presentation === "map" ? ($("r-trip").offsetHeight || 0) : 0;
  const panelOpen = state.presentation === "map" && state.nav === "search";
  let pad;
  if (land){
    const left = panelOpen ? Math.min(380, Math.round(innerWidth*0.44)) + 20 : 130;
    pad = { top: Math.round(innerHeight*0.42), bottom: tripH ? tripH + 22 : 60, left, right:60 };
  } else {
    const top = Math.round((state.presentation === "map" ? 0.58 : 0.45) * innerHeight);
    const bottom = panelOpen ? Math.round(innerHeight*0.40) : (tripH ? tripH + 22 : 120);
    pad = { top, bottom, left:24, right:24 };
  }
  map.setPadding(pad);
}

/* ── kaart ───────────────────────────────────────────────── */
const STYLE = "https://tiles.openfreemap.org/styles/liberty";
let map, marker;
function initMap(lon, lat){
  map = new maplibregl.Map({
    container:"map", style:STYLE,
    center:[lon,lat], zoom:17, pitch:60, bearing:0,
    attributionControl:{compact:true}, fadeDuration:0
  });
  map.touchZoomRotate.disableRotation();
  map.setPadding({ top: Math.round(innerHeight * .58) });
  const el = document.createElement("div");
  el.className = "me";
  el.innerHTML = `<svg viewBox="0 0 30 30"><path d="M15 3 L25 27 L15 21 L5 27 Z" fill="#FFB300" stroke="#0B0F14" stroke-width="1.5"/></svg>`;
  marker = new maplibregl.Marker({element:el, rotationAlignment:"map"})
            .setLngLat([lon,lat]).addTo(map);
  map.on("load", () => { mapReady = true; applyMapPadding(); if (nav.coords.length) drawNavRoute(); });
  map.on("movestart", e => { if (e.originalEvent) suspendFollow(); });
}
function updateCamera(lon, lat, bearing){
  if (!marker) return;
  marker.setLngLat([lon,lat]);
  marker.setRotation(bearing ?? 0);
  if (state.presentation === "map" && mapReady && following)
    map.easeTo({ center:[lon,lat], bearing:bearing ?? map.getBearing(), duration:600, easing:x=>x });
}
function suspendFollow(){
  following = false;
  clearTimeout(followTimer);
  followTimer = setTimeout(resumeFollow, 10000);
  render();
}
function resumeFollow(){
  clearTimeout(followTimer);
  following = true;
  if (marker && mapReady && state.presentation === "map")
    map.easeTo({ center: marker.getLngLat(), bearing: lastBearing ?? map.getBearing(), duration:500 });
  render();
}

/* ── GPS & snelheidsfilter (hergebruikt) ─────────────────── */
function startGPS(){
  if (!("geolocation" in navigator)){ showNotice(t("ntc_nogps"), t("ntc_nogps_t")); return; }
  navigator.geolocation.watchPosition(onFix, onErr,
    { enableHighAccuracy:true, maximumAge:1000, timeout:15000 });
}
function alphaFor(acc, v){
  let a = acc <= 5 ? .60 : acc <= 10 ? .45 : acc <= 20 ? .30 : .20;
  if (v < 3) a *= .8;
  return a;
}
function onFix(pos){
  hideNotice();
  const c = pos.coords, ts = pos.timestamp;
  lastFixTime = Date.now();
  lastLat = c.latitude; lastLon = c.longitude;
  if (!firstFix){ firstFix = true; initMap(c.longitude, c.latitude); }

  const acc = c.accuracy ?? 999;
  $("gpsDot").className = acc <= 8 ? "ok" : acc <= 25 ? "mid" : "";
  $("gpsTxt").textContent = `±${Math.round(acc)} m`;

  if (c.altitude != null && !isNaN(c.altitude)){
    const va = (c.altitudeAccuracy != null && !isNaN(c.altitudeAccuracy)) ? c.altitudeAccuracy : 30;
    if (va <= 30){
      const w = va <= 8 ? .25 : va <= 15 ? .15 : .08;
      lastAltRaw = lastAltRaw == null ? c.altitude : lastAltRaw + w * (c.altitude - lastAltRaw);
    }
  }

  fixBuf.push({ t:ts, lat:c.latitude, lon:c.longitude, acc });
  while (fixBuf.length && ts - fixBuf[0].t > 12000) fixBuf.shift();

  let m = (c.speed != null && !isNaN(c.speed) && c.speed >= 0) ? c.speed : null;
  if (m === null && fixBuf.length > 1){
    let ref = fixBuf[0];
    for (const f of fixBuf) if (ts - f.t >= 3000) ref = f;
    const dt = (ts - ref.t) / 1000;
    if (dt > 0.8) m = hv(ref, {lat:c.latitude, lon:c.longitude}) / dt;
  }

  let still = false;
  const old5 = fixBuf.find(f => ts - f.t >= 4500);
  if (old5){
    const moved = hv(old5, {lat:c.latitude, lon:c.longitude});
    if (moved < Math.max(4, Math.min(acc, 25) * .8)) still = true;
  }
  if (still){
    dispSpeed *= .3; if (dispSpeed < .45) dispSpeed = 0;
  } else if (m !== null){
    if (m < .6) m = 0;
    dispSpeed += alphaFor(acc, m) * (m - dispSpeed);
    if (dispSpeed < .45 && m < .7) dispSpeed = 0;
  }
  if (c.heading != null && !isNaN(c.heading) && dispSpeed > 1.1) lastBearing = c.heading;

  /* tripafstand + routepunten (hoogte altijd NAP-gecorrigeerd geregistreerd) */
  if (trip.running && acc <= 35){
    trip.accSum += acc; trip.accN++;
    const here = { lat:c.latitude, lon:c.longitude };
    if (lastPos){
      const d  = hv(lastPos, here);
      const dt = (ts - lastPos.t) / 1000;
      if (d > Math.min(acc, 12) * .6 && (dt <= 0 || d/dt < 70)){
        trip.dist += d;
        if (dispSpeed > trip.max) trip.max = dispSpeed;
        lastPos = { ...here, t:ts };
      } else if (d > 200){
        lastPos = { ...here, t:ts };
      }
    } else lastPos = { ...here, t:ts };

    if (!lastSample || ts - lastSample.t >= 3000 || hv(lastSample, here) >= 25){
      route.push({ t:ts, lat:+c.latitude.toFixed(6), lon:+c.longitude.toFixed(6),
                   v:+dispSpeed.toFixed(2),
                   alt: lastAltRaw == null ? null : +(lastAltRaw - altOffset).toFixed(1),
                   acc: Math.round(acc) });
      lastSample = { ...here, t:ts };
    }
  } else {
    lastPos = { lat:c.latitude, lon:c.longitude, t:ts };
  }

  updateCamera(c.longitude, c.latitude, lastBearing);
  navOnFix(c);
  render();
}
function onErr(e){
  if (e.code === 1) showNotice(t("ntc_deny"), t("ntc_deny_t"));
  else $("gpsTxt").textContent = t("nofix");
}

/* ── klok, auto-pauze & persistentie ─────────────────────── */
setInterval(() => {
  if (firstFix && Date.now() - lastFixTime > 4000){
    dispSpeed *= .5; if (dispSpeed < .4) dispSpeed = 0;
  }
  if (dispSpeed > 1.2) lastMotion = Date.now();   // ~4,3 km/u = in beweging
   if (dispSpeed < .55){
    if (zeroSince === null) zeroSince = Date.now();
    isPaused = autoPause && (Date.now() - zeroSince > 5000);
  } else { zeroSince = null; isPaused = false; }
  if (trip.running && !(autoPause && isPaused)){ trip.ms += 1000; }
  if (trip.running || dispSpeed > 0) render();
}, 1000);
setInterval(() => {
  LS.setItem("rm_trip", JSON.stringify(trip));
  if (trip.running) LS.setItem("rm_route", JSON.stringify(route));
}, 15000);
addEventListener("pagehide", () => {
  LS.setItem("rm_trip", JSON.stringify(trip));
  if (trip.running) LS.setItem("rm_route", JSON.stringify(route));
});

/* ── meten: start/stop/reset ─────────────────────────────── */
function toggleTrip(){
  trip.running = !trip.running;
  if (trip.running){
    if (!trip.start) trip.start = Date.now();
    lastPos = null; lastSample = null;
  } else LS.setItem("rm_route", JSON.stringify(route));
  LS.setItem("rm_trip", JSON.stringify(trip));
  render();
}
function tripName(start){
  const d = new Date(start || Date.now());
  return d.toLocaleDateString(loc(), { day:"numeric", month:"short" }) + " " +
         d.toLocaleTimeString(loc(), { hour:"2-digit", minute:"2-digit" });
}
async function saveAndReset(){
  if (trip.dist >= 100){
    const rec = {
      id: trip.start || Date.now(), name: tripName(trip.start),
      start: trip.start || Date.now(), end: Date.now(),
      ms: trip.ms, dist: trip.dist, max: trip.max,
      accAvg: trip.accN ? trip.accSum / trip.accN : null, points: route
    };
    try { await idbPut(rec); toast(t("saved")); } catch(e){ console.error(e); }
  } else toast(t("cleared"));
  Object.assign(trip, { running:false, dist:0, ms:0, max:0, start:0, accSum:0, accN:0 });
  route = []; lastSample = null;
  LS.setItem("rm_trip", JSON.stringify(trip));
  LS.removeItem("rm_route");
  render();
}

/* ── geschiedenis (modale overlay) ───────────────────────── */
async function openHist(){
  state.overlay = "history"; render();
  const trips = (await idbAll().catch(() => [])).sort((a,b) => b.id - a.id);
  const list = $("histList");

  const wk = new Date(now); wk.setHours(0,0,0,0);
  wk.setDate(wk.getDate() - ((wk.getDay() + 6) % 7));

  const sum = l => ({ n:l.length, d:l.reduce((s,r)=>s+r.dist,0), t:l.reduce((s,r)=>s+r.ms,0) });

    `<div class="tot"><span>${lbl}</span><b>${fmtDist(s.d)} ${useMph?"mi":"km"}</b>` +

  $("histTotals").innerHTML = trips.length
    ? cell(t("week"),  sum(trips.filter(r => r.start >= wk)))
    + cell(t("month"), sum(trips.filter(r => r.start >= mo)))
    + cell(t("total"), sum(trips)) : "";
  for (const r of trips){
    const btn = document.createElement("button");
    btn.className = "hrow";

      `<span class="l"><b>${r.name}</b><span>${fmtTime(r.ms)} · ${t("avg")} ${fmtSpeed(avg)} ${unitLbl()}</span></span>
       <span class="r"><b>${fmtDist(r.dist)}</b><span>${useMph?"mi":"km"}</span></span>`;
    btn.onclick = () => openDetail(r.id);
    list.appendChild(btn);
  }
}
function closeHist(){ state.overlay = "none"; render(); }

let dmapInst = null, detId = null;
async function openDetail(id){
  const r = await idbGet(id); if (!r) return;
  detId = id;
  state.overlay = "detail"; render();
  $("detTitle").textContent = r.name;
  const avg = r.ms > 0 ? r.dist / (r.ms/1000) : 0;
  const stat = (v,l) => `<div class="stat"><b>${v}</b><span>${l}</span></div>`;
  $("detStats").innerHTML =
    stat(fmtDist(r.dist) + " " + (useMph?"mi":"km"), t("dist")) +
    stat(fmtTime(r.ms), t("time")) +
    stat(fmtSpeed(avg) + " " + unitLbl(), t("avg")) +
    stat(fmtSpeed(r.max) + " " + unitLbl(), t("max")) +
    stat(new Date(r.start).toLocaleString(loc(), {dateStyle:"short", timeStyle:"short"}), t("started")) +
    stat(r.accAvg ? "±" + Math.round(r.accAvg) + " m" : "—", t("accuracy"));
  if (dmapInst){ dmapInst.remove(); dmapInst = null; }
  const pts = (r.points || []).filter(p => p.lat && p.lon);
  if (pts.length >= 2){
    setTimeout(() => {
      const coords = pts.map(p => [p.lon, p.lat]);
      const bounds = coords.reduce((b,c) => b.extend(c),
        new maplibregl.LngLatBounds(coords[0], coords[0]));
      dmapInst = new maplibregl.Map({
        container:"dmap", style:STYLE, bounds, fitBoundsOptions:{ padding:34 },
        attributionControl:{compact:true}, fadeDuration:0
      });
      dmapInst.on("load", () => {
        dmapInst.addSource("route", { type:"geojson",
          data:{ type:"Feature", geometry:{ type:"LineString", coordinates:coords } } });
        dmapInst.addLayer({ id:"route", type:"line", source:"route",
          paint:{ "line-color":"#2D8CFF", "line-width":4, "line-opacity":.9 } });
      });
    }, 60);
    $("dmap").style.display = "block";
  } else $("dmap").style.display = "none";
  drawProfile(pts);
}
function closeDetail(){
  if (dmapInst){ dmapInst.remove(); dmapInst = null; }
  state.overlay = "history"; render();
}

/* ── hoogteprofiel (Canvas) ──────────────────────────────── */
function drawProfile(pts){
  const cv = $("profile"), note = $("profNote");
  const data = []; let cum = 0;
  for (let i = 0; i < pts.length; i++){
    if (i) cum += hv(pts[i-1], pts[i]);
    if (pts[i].alt != null) data.push({ x:cum, y:pts[i].alt });
  }
  if (data.length < 2){
    cv.style.display = "none"; note.style.display = "block"; note.textContent = t("no_alt"); return;
  }
  cv.style.display = "block"; note.style.display = "none";
  const dpr = window.devicePixelRatio || 1;
  const W = cv.clientWidth || 300, H = 140;
  cv.width = W * dpr; cv.height = H * dpr;
  const g = cv.getContext("2d"); g.scale(dpr, dpr);
  const padL = 34, padR = 8, padT = 10, padB = 20;
  const minY0 = Math.min(...data.map(p => p.y)), maxY0 = Math.max(...data.map(p => p.y));
  const span = Math.max(10, maxY0 - minY0);
  const minY = minY0 - (span - (maxY0 - minY0)) / 2;
  const maxX = data[data.length - 1].x || 1;
  const X = x => padL + (x / maxX) * (W - padL - padR);
  const Y = y => padT + (1 - (y - minY) / span) * (H - padT - padB);
  g.clearRect(0, 0, W, H);
  g.beginPath(); g.moveTo(X(data[0].x), Y(data[0].y));
  for (const p of data) g.lineTo(X(p.x), Y(p.y));
  g.lineTo(X(maxX), H - padB); g.lineTo(X(0), H - padB); g.closePath();
  g.fillStyle = "rgba(255,179,0,.12)"; g.fill();
  g.beginPath(); g.moveTo(X(data[0].x), Y(data[0].y));
  for (const p of data) g.lineTo(X(p.x), Y(p.y));
  g.strokeStyle = "#FFB300"; g.lineWidth = 2; g.lineJoin = "round"; g.stroke();
  g.fillStyle = "#7E8B98"; g.font = "10px system-ui";
  const aF = m => useMph ? Math.round(m * 3.28084) + " ft" : Math.round(m) + " m";
  g.fillText(aF(maxY0), 2, Y(maxY0) + 3);
  g.fillText(aF(minY0), 2, Y(minY0) + 3);
  g.fillText("0", padL, H - 6);
  const dTxt = fmtDist(maxX) + " " + (useMph ? "mi" : "km");
  g.fillText(dTxt, W - padR - g.measureText(dTxt).width, H - 6);
}

/* ── GPX-export & back-up ────────────────────────────────── */
const gpxDoc = inner => `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="RitMeter" xmlns="http://www.topografix.com/GPX/1/1">
${inner}
</gpx>`;
function trkXML(r){
  const pts = (r.points || []).map(p =>
    `      <trkpt lat="${p.lat}" lon="${p.lon}">` +
    (p.alt != null ? `<ele>${p.alt}</ele>` : "") +
    `<time>${new Date(p.t).toISOString()}</time></trkpt>`).join("\n");
  return `  <trk>\n    <name>${r.name}</name>\n    <trkseg>\n${pts}\n    </trkseg>\n  </trk>`;
}
const toGPX = r => gpxDoc(trkXML(r));
async function shareOrDownload(file, title){
  if (navigator.canShare && navigator.canShare({ files:[file] })){
    try { await navigator.share({ files:[file], title }); return; } catch(e){}
  }
  const a = document.createElement("a");
  a.href = URL.createObjectURL(file); a.download = file.name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}
async function shareGPX(){
  const r = await idbGet(detId); if (!r) return;
  const fname = "ritmeter_" + new Date(r.start).toISOString().slice(0,16).replace(/[:T]/g,"-") + ".gpx";
  shareOrDownload(new File([toGPX(r)], fname, { type:"application/gpx+xml" }), r.name);
}
async function gpxAll(){
  const trips = (await idbAll().catch(() => [])).sort((a,b) => a.id - b.id);
  if (!trips.length) return;
  shareOrDownload(new File([gpxDoc(trips.map(trkXML).join("\n"))],
    "ritmeter_alle_ritten.gpx", { type:"application/gpx+xml" }), "RitMeter");
}
async function backup(){
  const trips = await idbAll().catch(() => []);
  const data = JSON.stringify({ app:"ritmeter", v:1, exported:new Date().toISOString(), trips });
  const fname = "ritmeter_backup_" + new Date().toISOString().slice(0,10) + ".json";
  shareOrDownload(new File([data], fname, { type:"application/json" }), "RitMeter back-up");
}
async function restore(file){
  try{
    const data = JSON.parse(await file.text());
    if (!data || data.app !== "ritmeter" || !Array.isArray(data.trips)) throw new Error();
    let n = 0;
    for (const r of data.trips)
      if (r && r.id && typeof r.dist === "number"){ await idbPut(r); n++; }
    toast(n + " " + t("restored")); openHist();
  } catch(e){ toast(t("bad_file")); }
}

/* native Wake Lock API (Android/desktop) */
let wakeLock = null;
async function acquireWake(){
  if (!("wakeLock" in navigator) || document.visibilityState !== "visible") return;
  if (wakeLock && !wakeLock.released) return;
  try{
    wakeLock = await navigator.wakeLock.request("screen");
    wakeLock.addEventListener("release", () => { wakeLock = null; });
  } catch(e){ wakeLock = null; }
}
function releaseWake(){
  if (wakeLock){ try { wakeLock.release(); } catch(e){} wakeLock = null; }
}

/* moet het scherm nú wakker blijven? */
function shouldStayAwake(){
  if (trip.running || state.nav === "route") return true;
  return (Date.now() - lastMotion) < KEEP_GRACE;
}
function applyKeepAwake(){
  if (document.visibilityState !== "visible") return;
  const want = shouldStayAwake();
  if (want){
    acquireWake();
    if (IS_IOS){ const v = keepVideo(); if (v.paused) v.play().catch(()=>{}); }
  } else {
    releaseWake();
    if (IS_IOS && keepVid && !keepVid.paused) keepVid.pause();
  }
}

/* iOS vereist dat het filmpje één keer vanuit een aanraking start;
   daarna mogen we het programmatisch sturen. */
document.addEventListener("pointerdown", () => {
  if (IS_IOS){ const v = keepVideo(); v.play().then(() => { if (!shouldStayAwake()) v.pause(); }).catch(()=>{}); }
  applyKeepAwake();
}, { once:false });

setInterval(applyKeepAwake, 5000);
document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") applyKeepAwake(); });

/* ═══════════════════════════════════════════════════════════
   RitMeter — navigatiemodule (alleen de routelijn)
   - Photon geocoding + BRouter routing (GeoJSON)
   - GEEN turn-by-turn: geen afslagen, geen off-route, geen auto-reroute
   - resterende afstand + ETA via projectie op de routelijn
   - favorieten in localStorage (rm_fav_nav, max 5)
   - alle zichtbaarheid loopt via state.nav → render()
   ═══════════════════════════════════════════════════════════ */
const PHOTON  = "https://photon.komoot.io/api/";
const BROUTER = "https://brouter.de/brouter";

/* km/u: cap = realistische bovengrens, def = vaste schatting bij onbruikbare API-tijd */
const SPEED = { car:{cap:140,def:60}, bike:{cap:35,def:18},
                moped:{cap:50,def:40}, snor:{cap:30,def:25} };
function profileFor(mode){
  if (mode === "bike" || mode === "snor") return "trekking";
  return mode === "moped" ? "moped" : "car-fast";        // brom = moped, auto = car-fast
}

const nav = {
  profile: vehicle, dest: null,
  coords: [], cum: [], distM: 0, etaS: 0, vAvg: 8,
  remM: 0, remEtaS: 0,
  destMarker: null, lastNear: null,
  offSince: null, rerouting: false, lastReroute: 0
};
let navHere = null;                  // laatst bekende GPS-positie {lat,lon}
let geoTimer = null, geoSeq = 0;

/* ── geo-helpers ─────────────────────────────────────────── */
/* afstand punt→lijnsegment (meters), lokaal vlak rond p */
function segDist(p, a, b){
  const latR = p.lat*Math.PI/180, mLat = 111320, mLon = 111320*Math.cos(latR);
  const ax=(a.lon-p.lon)*mLon, ay=(a.lat-p.lat)*mLat;
  const bx=(b.lon-p.lon)*mLon, by=(b.lat-p.lat)*mLat;
  const dx=bx-ax, dy=by-ay, L2=dx*dx+dy*dy;
  let tt = L2>0 ? -((ax*dx+ay*dy)/L2) : 0;
  tt = Math.max(0, Math.min(1, tt));
  return { d: Math.hypot(ax+tt*dx, ay+tt*dy), t: tt };
}
/* dichtstbijzijnde route-knooppunt t.o.v. positie (gevensterd voor snelheid) */
function nearestIdx(here){
  const n = nav.coords.length;
  let lo = 0, hi = n;
  if (nav.lastNear != null){ lo = Math.max(0, nav.lastNear-30); hi = Math.min(n, nav.lastNear+120); }
  let best = lo, bd = Infinity;
  for (let i = lo; i < hi; i++){
    const d = hv(here, nav.coords[i]);
    if (d < bd){ bd = d; best = i; }
  }
  nav.lastNear = best;
  return best;
}

function favGet(){ try { return JSON.parse(LS.getItem("rm_fav_nav") || "[]"); } catch { return []; } }
function favSave(list){ LS.setItem("rm_fav_nav", JSON.stringify(list.slice(0,5))); renderFavs(); updateFavStar(); }
function favIndexOf(d){
  if (!d) return -1;
  return favGet().findIndex(f => Math.abs(f.lat-d.lat)<1e-5 && Math.abs(f.lon-d.lon)<1e-5);
}
function updateFavStar(){ $("navSaveFav").classList.toggle("on", favIndexOf(nav.dest) >= 0); }
function favToggle(d){
  if (!d) return;
  const i = favIndexOf(d);
  if (i >= 0) favDel(i); else favAdd(d);
  updateFavStar();
}
function favAdd(item){
  let list = favGet().filter(f => !(Math.abs(f.lat-item.lat)<1e-5 && Math.abs(f.lon-item.lon)<1e-5));
  if (list.length >= 5){ toast(t("nav_fav_full")); list = list.slice(0,4); }
  list.unshift({ name:item.name, lat:item.lat, lon:item.lon });
  favSave(list);
  toast(t("nav_fav_saved"));
}
function favDel(idx){ const list = favGet(); list.splice(idx,1); favSave(list); }
function renderFavs(){
  const box = $("navFavs"); if (!box) return;
  const list = favGet();
  box.innerHTML = "";
  if (!list.length){ const m=document.createElement("div"); m.className="navMsg";

    chip.append(go, del); box.appendChild(chip);
  });
}

/* ── geocoding (Photon) ──────────────────────────────────── */
function photonLabel(p){
  const a = [];
  if (p.name) a.push(p.name);
  const street = p.street ? p.street + (p.housenumber ? " "+p.housenumber : "") : null;
  if (street && street !== p.name) a.push(street);
  const city = p.city || p.town || p.village || p.county;
  if (city) a.push(city + (p.postcode ? " "+p.postcode : ""));
  if (p.state && !city) a.push(p.state);
  if (p.country) a.push(p.country);
  return a.filter(Boolean).join(", ") || (p.osm_value || "?");
}
async function geoSearch(q){
  const seq = ++geoSeq;
  const box = $("navResults");
  box.innerHTML = `<div class="navMsg">${t("nav_calc")}</div>`;
  let url = `${PHOTON}?q=${encodeURIComponent(q)}&limit=6`;
  if (navHere) url += `&lat=${navHere.lat.toFixed(4)}&lon=${navHere.lon.toFixed(4)}`;
  try{
    const res = await fetch(url);
    const j = await res.json();
    if (seq !== geoSeq) return;                 // verouderd antwoord
    const items = (j.features || [])
      .filter(f => f.geometry && f.geometry.coordinates)
      .map(f => ({ name: photonLabel(f.properties || {}),
                   lat: +f.geometry.coordinates[1], lon: +f.geometry.coordinates[0] }));
    renderResults(items);
  } catch(e){
    if (seq === geoSeq){ box.innerHTML = `<div class="navMsg">${t("nav_err")}</div>`; }
  }
}
function renderResults(items){
  const box = $("navResults"); box.innerHTML = "";
  if (!items.length){ box.innerHTML = `<div class="navMsg">${t("nav_none")}</div>`; return; }
  items.forEach(it => {
    const b = document.createElement("button"); b.className = "navRes";
    const nm = document.createElement("b"); nm.textContent = it.name.split(",")[0];
    const sub = document.createElement("span");
    sub.textContent = it.name.split(",").slice(1).join(",").trim();
    b.append(nm, sub); b.onclick = () => selectDest(it);
    box.appendChild(b);
  });
}

/* ── routing (BRouter) ───────────────────────────────────── */
function computeEta(distM, apiTimeS, mode){
  const s = SPEED[mode] || SPEED.bike;
  if (mode === "snor") return distM / (25/3.6);          // altijd vaste 25 km/u
  if (!(apiTimeS > 0)) return distM / (s.def/3.6);        // geen API-tijd
  const v = distM / apiTimeS * 3.6;                       // km/u volgens API
  if (v > s.cap || v < 3) return distM / (s.def/3.6);     // onrealistisch → vaste schatting
  return apiTimeS;
}
async function fetchRoute(o, d, mode){
  const prof = profileFor(mode);
  const lonlats = `${o.lon.toFixed(6)},${o.lat.toFixed(6)}|${d.lon.toFixed(6)},${d.lat.toFixed(6)}`;
  const url = `${BROUTER}?lonlats=${lonlats}&profile=${prof}&alternativeidx=0&format=geojson`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("brouter " + res.status);
  const j = await res.json();
  const feat = (j.features || []).find(f => f.geometry && f.geometry.type === "LineString");
  if (!feat || !feat.geometry.coordinates.length) throw new Error("geen route");
  const coords = feat.geometry.coordinates.map(c => ({ lon:+c[0], lat:+c[1] }));
  const p = feat.properties || {};
  let distM = parseFloat(p["track-length"]);
  if (!(distM > 0)){ distM = 0; for (let i=1;i<coords.length;i++) distM += hv(coords[i-1], coords[i]); }
  return { coords, distM, etaS: computeEta(distM, parseFloat(p["total-time"]), mode) };
}
function applyRoute(r){
  nav.coords = r.coords;
  nav.cum = [0];
  for (let i = 1; i < r.coords.length; i++) nav.cum[i] = nav.cum[i-1] + hv(r.coords[i-1], r.coords[i]);
  nav.distM = r.distM; nav.etaS = r.etaS;
  nav.vAvg = r.etaS > 0 ? r.distM / r.etaS : (SPEED[nav.profile].def/3.6);
  nav.remM = r.distM; nav.remEtaS = r.etaS;
  nav.lastNear = null;
}

/* route ophalen voor de huidige bestemming; toont preview in het paneel */
async function navComputeRoute(){
  if (!nav.dest) return;
  if (!navHere){ $("navInfoPanel").textContent = t("nav_wait_gps"); return; }
  $("navInfoPanel").textContent = t("nav_calc");
  $("navStart").disabled = true;
  try{
    applyRoute(await fetchRoute(navHere, nav.dest, nav.profile));
    $("navInfoPanel").innerHTML =
      `<b>${fmtNavDist(nav.distM)}</b> &middot; ${fmtEta(nav.etaS)}` +
      ` &middot; ${t("eta")} ${fmtArrival(nav.etaS)}`;
    $("navStart").disabled = false;
    if (state.nav === "route"){ drawNavRoute(); render(); }   // actieve route herberekend
  } catch(e){
    console.error(e);
    nav.coords = []; nav.cum = [];
    clearNavRoute();
    $("navInfoPanel").textContent = t("nav_err");
    $("navStart").disabled = true;
  }
}

/* ── route + bestemmingspin op de hoofdkaart ─────────────── */
function drawNavRoute(){
  if (!map || !mapReady || !nav.coords.length) return;
  const data = { type:"Feature", properties:{},
    geometry:{ type:"LineString", coordinates: nav.coords.map(p => [p.lon, p.lat]) } };
  if (map.getSource("nav-route")) map.getSource("nav-route").setData(data);
  else {
    map.addSource("nav-route", { type:"geojson", data });
    map.addLayer({ id:"nav-route-casing", type:"line", source:"nav-route",
      layout:{ "line-cap":"round", "line-join":"round" },
      paint:{ "line-color":"#3A0A33", "line-width":11, "line-opacity":.95 } });
    map.addLayer({ id:"nav-route-line", type:"line", source:"nav-route",
      layout:{ "line-cap":"round", "line-join":"round" },
      paint:{ "line-color":"#E000FF", "line-width":6, "line-opacity":.95 } });
  }
  if (nav.dest){
    if (!nav.destMarker){
      const el = document.createElement("div"); el.className = "navDest";
      el.innerHTML = `<svg width="30" height="38" viewBox="0 0 24 30"><path d="M12 0a10 10 0 0 0-10 10c0 7 10 20 10 20s10-13 10-20A10 10 0 0 0 12 0z" fill="#E000FF" stroke="#0B0F14" stroke-width="1.5"/><circle cx="12" cy="10" r="4" fill="#0B0F14"/></svg>`;
      nav.destMarker = new maplibregl.Marker({ element:el, anchor:"bottom" })
        .setLngLat([nav.dest.lon, nav.dest.lat]).addTo(map);
    } else nav.destMarker.setLngLat([nav.dest.lon, nav.dest.lat]).addTo(map);
  }
}
function clearNavRoute(){
  if (map){
    for (const id of ["nav-route-line","nav-route-casing"]) if (map.getLayer(id)) map.removeLayer(id);
    if (map.getSource("nav-route")) map.removeSource("nav-route");
  }
  if (nav.destMarker){ nav.destMarker.remove(); nav.destMarker = null; }
}

/* ── opmaak afstand & ETA ────────────────────────────────── */
function fmtNavDist(m){
  if (useMph){
    const ft = m*3.28084;
    if (ft < 1000) return (Math.round(ft/10)*10) + " ft";
    const mi = m/1609.344;
    return (lang === "nl" ? mi.toFixed(1).replace(".",",") : mi.toFixed(1)) + " mi";
  }
  if (m < 1000) return (Math.round(m/10)*10) + " m";
  const km = m/1000;
  return (lang === "nl" ? km.toFixed(1).replace(".",",") : km.toFixed(1)) + " km";
}
function fmtEta(s){
  s = Math.round(s);
  const h = Math.floor(s/3600), m = Math.round((s % 3600)/60);
  return h ? `${h} ${t("eta_hr")} ${m} ${t("eta_min")}` : `${Math.max(1, m)} ${t("eta_min")}`;
}
function fmtArrival(remS){
  return new Date(Date.now() + remS*1000)
    .toLocaleTimeString(loc(), { hour:"2-digit", minute:"2-digit" });
}

/* automatisch herberekenen vanaf de huidige positie wanneer je van de route bent */
async function navReroute(){
  if (!navHere || !nav.dest || nav.rerouting) return;
  nav.rerouting = true;
  try{
    applyRoute(await fetchRoute(navHere, nav.dest, nav.profile));
    drawNavRoute();
    nav.offSince = null; nav.lastReroute = Date.now();
    toast(t("nav_rerouted"));
    render();
  } catch(e){ /* netwerk/BRouter faalt: oude route laten staan, later opnieuw proberen */ }
  finally{ nav.rerouting = false; }
}

/* ── per GPS-fix aangeroepen vanuit onFix() (vóór render) ── */
function navOnFix(c){
  navHere = { lat:c.latitude, lon:c.longitude };
  if (state.nav !== "route" || !nav.coords.length) return;
  if (map && mapReady && !map.getSource("nav-route")) drawNavRoute();

  const idx = nearestIdx(navHere);
  /* projecteer op het segment ná het dichtstbijzijnde knooppunt voor een vloeiende rest-afstand */
  let along = nav.cum[idx] || 0;
  if (idx < nav.coords.length-1){
    const seg = segDist(navHere, nav.coords[idx], nav.coords[idx+1]);
    along = (nav.cum[idx] || 0) + seg.t * ((nav.cum[idx+1] || 0) - (nav.cum[idx] || 0));
  }
  nav.remM = Math.max(0, nav.distM - along);
  nav.remEtaS = nav.remM / (nav.vAvg || 8);

  /* aankomst: pas melden bij échte nabijheid van de bestemming (niet op projectie) */
  if (nav.dest && hv(navHere, nav.dest) < 30){
    toast(t("nav_arrived"));
    navStop();
    return;
  }

  /* off-route: loodrechte afstand tot de route; >60 m gedurende >10 s → herbereken
     (gedebounced, max ~1×/15 s zodat we BRouter niet overvragen) */
  let offD = Infinity;
  for (let i = Math.max(0, idx-1); i < Math.min(nav.coords.length-1, idx+1); i++)
    offD = Math.min(offD, segDist(navHere, nav.coords[i], nav.coords[i+1]).d);
  if (offD === Infinity) offD = hv(navHere, nav.coords[idx] || navHere);

  if (offD > 60){
    if (nav.offSince === null) nav.offSince = Date.now();
    else if (Date.now() - nav.offSince > 10000 && !nav.rerouting
             && Date.now() - nav.lastReroute > 15000) navReroute();
  } else nav.offSince = null;
}

/* ── selecteren & paneelbediening (muteren state → render) ── */
function selectDest(item){
  nav.dest = item;
  $("navSearch").value = item.name.split(",")[0];
  $("navResults").innerHTML = "";
  $("navSaveFav").classList.add("show");
  updateFavStar();
  navComputeRoute();
}
function openNavPanel(){
  state.nav = "search";
  renderFavs();
  render();
  applyMapPadding();
}
function closeNavPanel(){
  if (state.nav === "route"){ render(); applyMapPadding(); return; }   // route loopt: terug naar route-weergave
  /* alleen-preview → opruimen en terug naar gewone kaart */
  nav.coords = []; nav.cum = []; nav.dest = null;
  nav.remM = 0; nav.remEtaS = 0;
  clearNavRoute();
  $("navInfoPanel").textContent = "";
  $("navStart").disabled = true;
  $("navSaveFav").classList.remove("show");
  state.nav = "off";
  render();
  applyMapPadding();
}
function navStartGuidance(){
  if (!nav.coords.length) return;
  state.nav = "route";
  drawNavRoute();
  render();
  applyMapPadding();
  if (map) setTimeout(() => map.resize(), 60);
}
function navStop(){
  nav.coords = []; nav.cum = []; nav.dest = null;
  nav.remM = 0; nav.remEtaS = 0; nav.lastNear = null;
  nav.offSince = null; nav.rerouting = false;
  clearNavRoute();
  $("navInfoPanel").textContent = "";
  $("navStart").disabled = true;
  $("navSaveFav").classList.remove("show");
  state.nav = "off";
  render();
  applyMapPadding();
}

/* ── voertuig = uitsluitend routeprofiel (raakt nooit de layout) ── */
function applyVehicle(){
  nav.profile = vehicle;
  document.querySelectorAll("#vehSeg button").forEach(b => b.classList.toggle("on", b.dataset.p === vehicle));
}
function setVehicle(v){
  vehicle = v; nav.profile = v; LS.setItem("rm_vehicle", v);
  applyVehicle();
  if (nav.dest) navComputeRoute();
}

/* ── event-bindings ──────────────────────────────────────── */
$("navBtn").onclick     = openNavPanel;
$("navClose").onclick   = closeNavPanel;
$("navStart").onclick   = navStartGuidance;
$("navStopBtn").onclick = navStop;
$("navRecalc").onclick  = () => { if (nav.dest) navComputeRoute(); };
$("navSaveFav").onclick = () => favToggle(nav.dest);
$("navSearch").addEventListener("input", e => {
  clearTimeout(geoTimer);
  const q = e.target.value.trim();
  if (q.length < 3){ $("navResults").innerHTML = ""; return; }
  geoTimer = setTimeout(() => geoSearch(q), 350);    // throttle: respecteer Photon fair-use
});
$("navSearch").addEventListener("keydown", e => {
  if (e.key === "Enter"){ clearTimeout(geoTimer);
    const q = e.target.value.trim(); if (q.length >= 2) geoSearch(q); }
});
document.querySelectorAll("#vehSeg button").forEach(b => { b.onclick = () => setVehicle(b.dataset.p); });
applyVehicle();

/* ── oriëntatie-/grootte-wissel: kaart bijwerken, padding herberekenen ── */
window.addEventListener("resize", () => { if (map){ map.resize(); applyMapPadding(); } });
if (screen.orientation)
  screen.orientation.addEventListener("change",
    () => setTimeout(() => { if (map){ map.resize(); applyMapPadding(); } }, 250));

/* ── start ───────────────────────────────────────────────── */
applyLang();   // zet teksten + roept syncSettingsUI() + render() aan
render();
applyKeepAwake();
lockPortrait();
startGPS();


</script>
